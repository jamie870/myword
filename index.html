<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini Voca Pro</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --accent: #f59e0b; --etym: #059669; --box-bg: #f1f5f9; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; -webkit-font-smoothing: antialiased; }
        
        .container { width: 92%; max-width: 400px; background: white; padding: 20px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; position: relative; }
        
        /* [상단 정보 박스 공통 포맷] */
        .info-display-container {
            width: 100%;
            min-height: 140px; /* 고정 높이로 흔들림 방지 */
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .info-box {
            background: var(--box-bg);
            border-radius: 12px;
            padding: 12px;
            font-size: 0.85rem;
            line-height: 1.5;
            color: #475569;
            text-align: left;
            min-height: 45px;
            display: flex;
            align-items: center;
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease;
        }

        /* 어원/뜻/예문 각각의 강조색 */
        #etym-box { border-left: 4px solid var(--etym); background: #f0fdf4; color: #134e4a; visibility: hidden; }
        #mean-box { border-left: 4px solid var(--primary); background: #eef2ff; color: #3730a3; font-weight: 700; font-size: 1rem; justify-content: center; visibility: hidden; }
        #ex-box { border-left: 4px solid #94a3b8; background: #f8fafc; visibility: hidden; }

        .placeholder-box { color: #cbd5e1; font-weight: 500; font-size: 0.8rem; justify-content: center; border: 1px dashed #e2e8f0; background: transparent; }

        /* 단어 스타일 */
        #word { font-size: 2.3rem; font-weight: 800; color: #1e293b; margin: 10px 0; letter-spacing: -1px; }
        
        /* 버튼 시스템 (한 줄 배치) */
        .control-btns { display: flex; gap: 6px; margin-top: 15px; justify-content: center; }
        button { border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        
        .btn-small { flex: 1; padding: 12px 2px; font-size: 0.8rem; }
        .btn-etym { background: var(--etym); color: white; }
        .btn-view { background: #1e293b; color: white; }
        .btn-audio { background: #eef2ff; color: #4f46e5; }
        
        .btn-next { width: 100%; background: var(--primary); color: white; padding: 16px; font-size: 1.1rem; margin-top: 10px; border-radius: 12px; box-shadow: 0 4px 12px rgba(99,102,241,0.3); }
        
        /* 하단 서브 버튼 */
        .bottom-btns { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .btn-know { background: transparent; color: #cbd5e1; padding: 5px 15px; font-size: 0.7rem; border: 1px solid #f1f5f9; border-radius: 20px; }
        .add-word-btn { background: var(--accent); color: white; padding: 12px; border-radius: 12px; font-size: 0.85rem; width: 100%; }

        .fav-star { position: absolute; top: 18px; right: 18px; font-size: 1.5rem; color: #e2e8f0; cursor: pointer; }
        .fav-star.active { color: var(--accent); }
        .stats { font-size: 0.7rem; color: #94a3b8; margin-bottom: 10px; text-align: left; }

        /* 모달 스타일 생략(기존과 동일) */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 100%; max-width: 340px; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 10px; margin: 6px 0; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div class="fav-star" id="fav-btn" onclick="toggleFavorite()">★</div>
    <div class="stats" id="progress-text">로드 중...</div>

    <div class="info-display-container">
        <div id="etym-box" class="info-box">어원 정보</div>
        <div id="mean-box" class="info-box">뜻 정보</div>
        <div id="ex-box" class="info-box">예문 정보</div>
    </div>

    <div id="word">Word</div>

    <div class="control-btns">
        <button class="btn-small btn-etym" onclick="showEtymology()">📜 어원</button>
        <button class="btn-small btn-view" onclick="showContent()">📖 뜻·예문</button>
        <button class="btn-small btn-audio" onclick="speak()">🔊 발음</button>
    </div>
    
    <button class="btn-next" onclick="nextWord()">다음 단어 (Next Word)</button>

    <div class="bottom-btns">
        <button class="btn-know" onclick="markAsKnown()">✅ 이 단어 암기 완료</button>
        <button class="add-word-btn" onclick="openModal()">+ 단어 직접 추가</button>
        <span onclick="resetData()" style="font-size:0.65rem; color:#cbd5e1; cursor:pointer;">학습 기록 초기화</span>
    </div>
</div>

<div id="modal" onclick="if(event.target == this) closeModal()">
    <div class="modal-content">
        <h3 style="margin-top:0">나만의 단어 추가</h3>
        <input type="text" id="new-en" placeholder="영어 (필수)">
        <input type="text" id="new-ko" placeholder="뜻 (필수)">
        <textarea id="new-etym" placeholder="어원/유래" rows="2"></textarea>
        <textarea id="new-ex" placeholder="예문" rows="2"></textarea>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button onclick="closeModal()" style="flex:1; padding:10px; background:#f1f5f9; border-radius:8px;">취소</button>
            <button onclick="addNewWord()" style="flex:1; padding:10px; background:var(--primary); color:white; border-radius:8px;">저장</button>
        </div>
    </div>
</div>

<script>
    const baseData = [
{ en: "The unthinkable", ko: "차마 못할 일, 차마 못할 짓", etym: "생각조차(think) 할 수 없는(un-) 끔찍하거나 불가능한 일을 뜻합니다.", ex: "They were forced to do the unthinkable to survive." },
{ en: "pooch", ko: "강아지", etym: "강아지를 부르는 귀엽고 친근한 구어체 표현입니다.", ex: "I take my pooch for a walk every morning." },
{ en: "stroll up to", ko: "~로 한가롭게 다가가다", etym: "서두르지 않고 산책하듯(stroll) 여유롭게 접근하는 모습입니다.", ex: "He strolled up to the counter and placed his order." },
{ en: "for what it’s worth, I’m sorry", ko: "지금와서 의미 없을 수도 있지만, 미안해", etym: "자신의 사과가 상대에게 얼마나 가치(worth) 있을지 모르겠지만 진심을 전할 때 씁니다.", ex: "For what it's worth, I'm sorry for what happened last year." },
{ en: "feel the pinch", ko: "경제적 압박을 느끼다", etym: "누군가에게 살을 꼬집히는(pinch) 것처럼 부족한 예산으로 고통받는 상황입니다.", ex: "Many families are starting to feel the pinch due to rising prices." },
{ en: "generic", ko: "마트 상품, PB상품", etym: "특정 브랜드 이름이 없는 일반적인(general) 제품을 의미합니다.", ex: "I usually buy generic brands to save money." },
{ en: "stick to it", ko: "그것을 지키다, 고수하다", etym: "풀로 붙인 듯(stick) 자신의 계획이나 원칙을 떼지 않고 유지한다는 뜻입니다.", ex: "It’s a tough diet, but you have to stick to it." },
{ en: "simply put", ko: "간단히 말해서", etym: "복잡한 내용을 쉬운 말로 놓아(put) 설명한다는 의미입니다.", ex: "Simply put, we don't have enough money for this." },
{ en: "I call the shots", ko: "내가 결정한다, 내가 지휘한다", etym: "사격이나 경기에서 발사(shot)를 지시하는 사람에서 유래하여 결정권을 가짐을 뜻합니다.", ex: "In this office, I'm the one who calls the shots." },
{ en: "Don’t sell yourself short", ko: "스스로를 과소평가하지마", etym: "자신의 가치를 실제보다 낮게 책정하여(short) 팔지 말라는 비유입니다.", ex: "You're very talented; don't sell yourself short." },
{ en: "pick up on", ko: "알아차리다, 눈치채다, 캐치하다", etym: "공중에 떠다니는 미묘한 신호를 집어 올리듯(pick up) 알아챈다는 뜻입니다.", ex: "She failed to pick up on his sarcasm." },

{ en: "meant to be", ko: "운명이다, 그렇게하기로 되어 있다", etym: "그렇게 되도록 이미 정해진(meant) 상태라는 뜻입니다.", ex: "If it's meant to be, it will happen." },

{ en: "sentiment", ko: "감정, 정서", etym: "특정 사안에 대해 느끼는(sent) 대중이나 개인의 마음가짐입니다.", ex: "Public sentiment toward the project is very positive." },

{ en: "top of mind", ko: "가장 먼저 떠오르는, 최대 관심사인", etym: "머릿속(mind) 가장 꼭대기(top)에 있어 언제든 생각나는 상태입니다.", ex: "Safety is top of mind for all our employees." },

{ en: "make a bet on", ko: "~에 내기를 걸다, ~을 담보로 도박하다", etym: "어떤 결과에 돈을 걸듯(bet) 위험을 감수하고 투자함을 의미합니다.", ex: "Investors are making a bet on the new tech startup." },

{ en: "401k", ko: "미국 개인연금 (폴오원케이)", etym: "미국 내국세법 401조 k항에 정의된 퇴직연금 제도에서 유래했습니다.", ex: "I need to start contributing more to my 401k." },
{ en: "a thing of the past", ko: "유물, 거의 사라진 것", etym: "현재는 없고 과거(past)에나 존재하던 물건이나 현상을 뜻합니다.", ex: "Public payphones are mostly a thing of the past." },

{ en: "dodgy", ko: "위태로운", etym: "이리저리 피해야(dodge) 할 정도로 수상하거나 품질이 낮은 상태입니다.", ex: "The internet connection here is a bit dodgy." },

​

{ en: "put~at risk", ko: "~을 위험에 빠뜨리다/위태롭게 하다", etym: "특정한 대상이나 가치를 위험(risk)의 범위 안에 두는(put) 상황입니다.", ex: "Smoking can put your health at risk." },
{ en: "be set to", ko: "~할 예정이다/~하기로 되어 있다", etym: "시계나 장비가 설정(set)된 것처럼 정해진 계획대로 움직일 것임을 뜻합니다.", ex: "The new movie is set to be released next month." },
{ en: "there you go", ko: "와, 대단하네요, 바로 그거죠", etym: "상대방이 잘 해냈을 때나 원하는 결과가 나왔을 때 칭찬하거나 동의하는 감탄사입니다.", ex: "You fixed it! There you go." },
{ en: "out of nowhere", ko: "갑자기, 뜬금없이", etym: "아무것도 없는 곳(nowhere)에서 밖으로(out) 튀어나오듯 예고 없이 일어난 일입니다.", ex: "The car appeared out of nowhere." },
{ en: "don’t play coy with me", ko: "시치미 떼지마, 모르는 척 하지마", etym: "수줍어하는 척(coy)하며 사실을 숨기거나 내숭 떨지 말라는 경고입니다.", ex: "You know exactly what I mean, so don't play coy with me." },
{ en: "be grappling with", ko: "~에 어려움을 겪고 있다", etym: "레슬링에서 상대를 붙잡고 싸우듯(grapple) 난제와 씨름하는 모습입니다.", ex: "The city is grappling with a rise in crime." },
{ en: "cost of food away from home", ko: "외식 비용", etym: "집(home)을 떠나서(away) 먹는 음식에 들어가는 비용을 사무적으로 표현한 것입니다.", ex: "The cost of food away from home has risen significantly." },
{ en: "have something off", ko: "주문하다", etym: "메뉴판 등에서 항목을 떼어내어(off) 가져오게 하듯 주문하는 상황입니다.", ex: "I'll have the steak off the menu." },
{ en: "make ends meet", ko: "생계를 유지하다, 수입과 지출의 균형을 맞추다", etym: "수입의 끝과 지출의 끝(ends)이 서로 닿게(meet) 만든다는 비유입니다.", ex: "It's hard to make ends meet with such a low salary." },
{ en: "spontaneously", ko: "즉흥적으로, 충동적으로", etym: "계획 없이 자발적으로(spontaneous) 즉석에서 일어나는 행동입니다.", ex: "We spontaneously decided to go on a road trip." },
{ en: "show signs of", ko: "~할 기미가 보이다", etym: "어떤 현상이 나타나기 전 신호(signs)를 보여준다는 뜻입니다.", ex: "The economy is starting to show signs of recovery." },
{ en: "It takes everything I’ve got", ko: "~내가 가진 모든 것을 쏟아야 한다, 모든 힘을 쏟아야 한다", etym: "내가 가진 에너지나 자원 전부(everything)를 소모(take)해야 할 만큼 힘든 일입니다.", ex: "It takes everything I've got to finish this marathon." },
{ en: "downtrodden", ko: "억눌린, 사회적으로 짓밟힌", etym: "아래로(down) 밟힌(trodden) 것처럼 압박받는 소외 계층을 뜻합니다.", ex: "The movie tells the story of the downtrodden factory workers." },
{ en: "on a whim", ko: "충동적으로", etym: "일시적인 기분이나 변덕(whim)에 따라 결정하고 행동하는 모습입니다.", ex: "I bought this dress on a whim." },
{ en: "livid", ko: "몹시 화난", etym: "너무 화가 나서 안색이 검푸르게(lividus) 질릴 정도의 상태를 의미합니다.", ex: "My boss was livid when I missed the deadline." },
{ en: "tacked", ko: "덧붙이다", etym: "압정(tack)으로 종이를 고정하듯, 기존 내용에 무언가를 추가로 붙이는 것입니다.", ex: "They tacked on a service charge without telling me." },
{ en: "pleaded for", ko: "~을 간청하다", etym: "법정에서 변론(plead)하듯 간절하게 도움이나 용서를 구하는 행위입니다.", ex: "The refugees pleaded for help." },
{ en: "it wasn’t until", ko: "~하고나서야 비로소", etym: "어떤 시점 전까지는 아니었다가, 그 시점이 되어서야 상황이 변했음을 강조합니다.", ex: "It wasn't until midnight that he finally arrived." },
{ en: "wobbly", ko: "테이블이 흔들리는", etym: "중심을 잡지 못하고 이리저리 흔들리는(wobble) 상태를 묘사합니다.", ex: "One of the legs on this chair is wobbly." },
{ en: "tacky", ko: "끈적거리는", etym: "페인트가 덜 말라 손에 달라붙는 느낌이나, 싸구려 같고 촌스러운 것을 비유합니다.", ex: "The floor is still a bit tacky." },
{ en: "use [sth] to one’s advantage", ko: "~을 자신에게 유리하게 활용하다", etym: "주어진 상황이나 도구를 자신의 이득(advantage)을 위해 도구로 쓰는 행동입니다.", ex: "She used her language skills to her advantage in the interview." },
{ en: "brew up a lot of buzz", ko: "큰 화제가 되다", etym: "커피를 끓이듯(brew) 기대감이나 소문(buzz)을 서서히 만들어낸다는 뜻입니다.", ex: "The new movie trailer brewed up a lot of buzz online." },
{ en: "Put your money where your mouth is", ko: "행동으로 보여줘야 한다", etym: "말(mouth)만 하지 말고 실제로 돈(money)을 걸어서 증명하라는 일침입니다.", ex: "If you say you can do it, put your money where your mouth is." },
{ en: "comp (compensate)", ko: "서비스 차원에서 무료로 제공하다", etym: "보상(compensate)의 줄임말로, 고객 불만이나 홍보를 위해 비용을 면제해 주는 것입니다.", ex: "The manager agreed to comp our drinks after the long wait." },
{ en: "compromise", ko: "희생시키다", etym: "타협하는 과정에서 원래의 가치나 품질을 낮추거나 포기하게 됨을 뜻합니다.", ex: "We will not compromise the quality of our products." },
{ en: "hospitality", ko: "환대, 고객응대정신, 서비스 마인드", etym: "손님(hospes)을 따뜻하게 대접하는 마음과 관련 산업을 아우르는 말입니다.", ex: "I was impressed by the warm hospitality of the locals." },
{ en: "give someone an appetite", ko: "~에 대한 열망/욕구를 갖게 하다", etym: "식욕(appetite)을 돋우듯 무언가를 더 원하게 만든다는 비유입니다.", ex: "The success of his first book gave him an appetite for more fame." },
{ en: "crank out", ko: "(기계처럼 빠르게) 끊임없이 만들어내다", etym: "기계의 손잡이(crank)를 돌려 물건을 쏟아내듯 대량으로 생산하는 모습입니다.", ex: "The factory cranks out thousands of parts every day." },
{ en: "converge", ko: "(한곳으로) 모이다, 수렴하다", etym: "서로 다른 방향에서 오던 것들이 한 점으로 함께(con-) 향함(verge)을 뜻합니다.", ex: "Thousands of fans converged on the stadium." },
{ en: "be forced out of", ko: "~에서 쫓겨나다, 물러나게 되다", etym: "자신의 의지가 아니라 외부의 압력(force)에 의해 밖으로(out) 밀려난 상황입니다.", ex: "He was forced out of his position after the scandal." },
{ en: "acknowledge", ko: "(사실로) 인정하다", etym: "어떤 사실을 알고 있음을(knowledge) 밖으로 드러내어 공식화함입니다.", ex: "The government finally acknowledged the problem." },
{ en: "move the needle", ko: "눈에 띄는 변화를 일으키다, 유의미한 진전을 보이다", etym: "계측기의 바늘(needle)을 움직일 만큼 실질적인 영향력이 있다는 뜻입니다.", ex: "The new advertising campaign didn't really move the needle for sales." },
{ en: "exponentially faster", ko: "기하급수적으로 더 빠르게", etym: "수학의 지수(exponent)처럼 시간이 갈수록 폭발적으로 속도가 붙는 상태입니다.", ex: "Technology is evolving exponentially faster every year." },
{ en: "boil down", ko: "핵심만 남기다, 요약하다", etym: "국물을 계속 끓여(boil) 수분을 날리고 진한 핵심만 남기는 과정입니다.", ex: "The whole problem boils down to a lack of money." },
{ en: "set too high", ko: "너무 높게 설정되어 있다", etym: "기준이나 목표치가 현실보다 지나치게 위로 잡혀 있다는 뜻입니다.", ex: "The expectations for the new project were set too high." },
{ en: "first things first", ko: "무엇보다 먼저", etym: "가장 중요한 일(first things)을 첫 번째(first) 순서로 하자는 원칙입니다.", ex: "First things first, let's get something to eat." },
{ en: "it’s crucial to ~", ko: "~하는 것이 매우 중요하다", etym: "십자가(crux) 모양의 교차점처럼, 결과에 결정적인 영향을 미치는 핵심 사항임을 뜻합니다.", ex: "It's crucial to follow the safety instructions." },
{ en: "as it pertains to", ko: "~와 관련해서", etym: "특정한 주제나 영역에 속하거나 관계가(pertain) 있는 경우를 말합니다.", ex: "The law as it pertains to environmental protection is very strict." },
{ en: "aggravation", ko: "골칫거리, 불쾌한 일", etym: "상황을 더 무겁게(grav-) 만들어 기분을 나쁘게 하는 일들을 뜻합니다.", ex: "Trying to get a refund was a lot of aggravation." },
{ en: "paste", ko: "(풀로) 붙이다", etym: "반죽(paste)이나 풀을 이용해 고정하듯 데이터를 옮겨 붙이는 행위입니다.", ex: "Just copy and paste the text into the document." },
{ en: "is determined by", ko: "~에 의해 결정되다", etym: "어떤 요인이 경계(term)를 지어 결과를 확정 짓는다는 뜻입니다.", ex: "Success is often determined by hard work and luck." },
{ en: "I can’t underscore this enough", ko: "아무리 강조해도 지나치지 않다", etym: "중요한 단어 아래에 선(underscore)을 긋는 것을 아무리 많이 해도 모자라다는 강조입니다.", ex: "I can't underscore this enough: safety is our top priority." },
{ en: "It took 사람 + 시간 to 동사", ko: "~가 ~하는데 시간이 걸리다", etym: "특정 행동을 완수하기 위해 시간이라는 자원을 소모(take)했다는 구문입니다.", ex: "It took me three hours to finish the report." },
{ en: "be among", ko: "~중에 한명이다", etym: "전체 집단 내에 섞여 있는 구성원 중 하나임을 나타냅니다.", ex: "He is among the most famous artists in the world." },
{ en: "grow so bad", ko: "상태가 나빠지다", etym: "나쁜 상황이 점차 자라나서(grow) 심각한 수준에 도달했다는 뜻입니다.", ex: "The traffic has grown so bad lately." },
{ en: "often", ko: "자주", etym: "어떤 일이 빈번하게 일어나는 횟수를 나타내는 단어입니다.", ex: "I often go to the gym after work." },
{ en: "in exchange", ko: "그 대가로, 대신에", etym: "준 것과 같은 가치의 것을 서로 맞바꾸는(exchange) 상황입니다.", ex: "I'll help you with math, and in exchange, you can help me with English." },


{ en: "in terms of", ko: "~의 측면에서", etym: "말하고자 하는 범위나 한계(term) 내에서 상황을 본다는 뜻입니다.", ex: "In terms of salary, it's a great job." },
{ en: "as many as + 숫자", ko: "~만큼이나 많이", etym: "숫자가 예상보다 많음을 강조할 때 쓰는 비교 구문입니다.", ex: "As many as 100 people attended the meeting." },
{ en: "in favor of the consumer", ko: "소비자에게 유리하게", etym: "결정이나 법이 소비자 쪽의 편(favor)을 들어준다는 의미입니다.", ex: "The new policy was designed in favor of the consumer." },
{ en: "nickel", ko: "5센트", etym: "미국의 5센트 동전을 부르는 명칭입니다.", ex: "I found a nickel on the street." },
{ en: "irrelevance", ko: "무관함, 중요하지 않음, 더이상 쓸모 없음", etym: "관련성(relevance)이 없는 상태, 즉 가치가 없어진 상태를 뜻합니다.", ex: "The old technology has faded into irrelevance." },
{ en: "I’d rather have + A + P.P", ko: "차라리 A가 ~된 상태였으면 좋겠어", etym: "현재 상황보다 A가 특정 조치를 받은 상태가 되길 선호한다는 가정법적 표현입니다.", ex: "I'd rather have it fixed today." },
{ en: "a new push for~", ko: "~을 추진하려는 새로운 움직임", etym: "어떤 일을 성사시키기 위해 새롭게 밀어붙이는(push) 노력을 뜻합니다.", ex: "There is a new push for renewable energy." },
{ en: "semi", ko: "대형화물트럭 (세마이)", etym: "반트레일러(semi-trailer)를 끄는 대형 트럭을 줄여서 부르는 말입니다.", ex: "A semi was parked on the side of the road." },
{ en: "a fraction of the size", ko: "크기가 훨씬 작다(비유)", etym: "전체의 일부(fraction)밖에 안 될 정도로 규모가 작음을 나타냅니다.", ex: "The new engine is just a fraction of the size of the old one." },
{ en: "not vary much", ko: "크게 달라지지 않는다", etym: "변화(vary)의 폭이 크지 않고 거의 일정하다는 뜻입니다.", ex: "The price of bread does not vary much from store to store." },
{ en: "come down the road", ko: "앞으로 무슨일이 일어날지", etym: "길(road)을 따라 앞으로 다가올 미래의 일을 비유적으로 표현합니다.", ex: "We don't know what challenges will come down the road." },
{ en: "beat out", ko: "경쟁자를 제치다", etym: "경합에서 상대를 때려눕히듯(beat) 이기고 우위를 점하는 모습입니다.", ex: "Our company managed to beat out the competition." },
{ en: "theatrical release", ko: "극장 개봉", etym: "영화가 스트리밍이 아닌 영화관(theater)에서 정식 상영되는 것입니다.", ex: "The movie is scheduled for a theatrical release in June." },
{ en: "antitrust scrutiny", ko: "반독점 조사", etym: "독점 금지(antitrust)를 위해 기업의 활동을 정밀하게 조사(scrutiny)하는 것입니다.", ex: "Tech giants are facing intense antitrust scrutiny." },
{ en: "accrued", ko: "시간에 따라 차곡차곡 쌓이다", etym: "이자나 혜택 등이 시간이 지나면서 점차 늘어나 쌓이는 과정입니다.", ex: "The interest accrued over the past ten years." },
{ en: "exploit", ko: "(자산/기회를) 활용하다, 이용하다", etym: "가용 자원을 최대한 뽑아내어 사용하거나, 때로는 부당하게 이용함을 뜻합니다.", ex: "We need to exploit every opportunity to grow." },
{ en: "a whole lot of~", ko: "아주 많은 양의 ~", etym: "a lot of를 강조하여 양이 정말 어마어마함을 나타냅니다.", ex: "That's a whole lot of money for a pair of shoes." },
{ en: "go bonkers for", ko: "~에 열광하다, ~에 미치다", etym: "제정신이 아닐(bonkers) 정도로 무언가를 아주 좋아한다는 구어체입니다.", ex: "Kids go bonkers for that new video game." },
{ en: "leave empty-handed", ko: "빈손으로 돌아가다", etym: "원하는 것을 얻지 못하고 손(hand)이 빈(empty) 채로 떠나는 상황입니다.", ex: "The robbers had to leave empty-handed." },
{ en: "much sought after", ko: "사람들이 많이 찾는, 구하기 힘든 상품", etym: "많은 사람에 의해 찾아(sought) 지는, 즉 인기가 매우 높은 상태입니다.", ex: "This rare comic book is much sought after by collectors." },
{ en: "a whopping + 숫자", ko: "무려 ~나 되는", etym: "숫자가 생각보다 엄청나게 커서 놀랍다는 것을 강조하는 수식어입니다.", ex: "The company reported a whopping $10 billion profit." },
{ en: "viral craze", ko: "바이럴 열풍", etym: "바이러스처럼 빠르게 퍼지는(viral) 광적인 유행(craze)을 뜻합니다.", ex: "The dance challenge became a viral craze." },
{ en: "looney tune", ko: "과하게 열정적인 사람", etym: "만화 '루니 툰' 캐릭터처럼 약간 미친 듯이 열정적이거나 엉뚱한 사람을 뜻합니다.", ex: "He's a bit of a looney tune when it comes to sports." },
{ en: "left me on read", ko: "답장을 씹다", etym: "메시지를 읽음(read) 상태로 두고 대답을 하지 않은 상황입니다.", ex: "I can't believe she left me on read for two days." },
{ en: "flabbergasted", ko: "매우 깜짝놀라서 어찌할 바를 모르다", etym: "너무 놀라 입이 떡 벌어지고 정신을 못 차릴 정도의 상태입니다.", ex: "I was flabbergasted when I heard the news." },
{ en: "a thorn in the side of", ko: "(~에게) 골칫거리, 성가신 존재", etym: "옆구리(side)에 박힌 가시(thorn)처럼 계속 신경 쓰이고 괴롭히는 존재입니다.", ex: "The new competitor is a thorn in the side of our company." },
{ en: "admit to ~ing", ko: "~했다고 인정하다", etym: "자신이 한 행동이나 사실을 시인(admit)하는 고백입니다.", ex: "He admitted to stealing the cookies." },
{ en: "make this less irritating", ko: "덜 성가시게 만들다", etym: "짜증 나거나(irritating) 불편한 점을 줄여서 좀 더 편하게 만든다는 뜻입니다.", ex: "Is there any way to make this process less irritating?" },
{ en: "play around with", ko: "~을 가지고 놀다, 시도해보다", etym: "심각하지 않게 이것저것 만져보거나 가볍게 시도(play)해 보는 모습입니다.", ex: "I'm just playing around with some new design ideas." },
{ en: "go through the store", ko: "매장을 돌아다니다", etym: "가게 내부를 통과하며(through) 상품들을 하나하나 살펴보는 동작입니다.", ex: "We spent hours going through the store." },
{ en: "may I be excused?", ko: "먼저 일어나도 될까요?", etym: "식사 도중이나 모임에서 정중하게 자리를 떠나도 될지 허락(excuse)을 구하는 말입니다.", ex: "Mom, I'm finished eating. May I be excused?" },
{ en: "those were the days", ko: "그때가 참 좋았었지", etym: "과거의 즐거웠던 시절(the days)을 회상하며 하는 감탄입니다.", ex: "We used to play outside until dark. Those were the days." },
{ en: "scoot over", ko: "좀 옆으로 비켜봐", etym: "앉아 있는 상태에서 엉덩이를 밀어 옆으로 조금 이동하는 동작입니다.", ex: "Can you scoot over a bit so I can sit down?" },
{ en: "pick up on", ko: "눈치채다", etym: "상황 속에 숨겨진 의도나 분위기를 포착(pick up)해 내는 것입니다.", ex: "Did you guys pick up on that weird vibe?" },
{ en: "allegedly", ko: "혐의를 받다, 의혹이 있다, 소문이 있다", etym: "근거는 있으나 아직 확실히 증명되지 않은 사실을 말할 때 씁니다.", ex: "He allegedly stole the money from the safe." },
{ en: "be apprehended", ko: "체포되었다", etym: "범인이 경찰에 의해 붙잡히거나(apprehend) 검거된 상태입니다.", ex: "The suspect was apprehended shortly after the crime." },
{ en: "on route to", ko: "~로 향하던 중에", etym: "특정 목적지로 가는 경로(route) 위에 있는 상황입니다.", ex: "The ambulance was on route to the hospital." },
{ en: "get away with", ko: "~을 훔쳐 달아나다", etym: "잘못을 저지르고도 처벌받지 않거나, 물건을 가지고 무사히 빠져나감을 뜻합니다.", ex: "The thieves got away with all the jewelry." },
{ en: "heist", ko: "(대형) 절도 사건 [하이스트]", etym: "치밀하게 계획된 은행이나 박물관 등의 대규모 강도/절도 행위입니다.", ex: "The Great Train Heist is a famous historical event." },
{ en: "a breeze", ko: "아주 쉬운 것", etym: "산들바람(breeze)처럼 가볍고 기분 좋게 끝낼 수 있는 쉬운 일입니다.", ex: "Fixing this computer was a breeze." },
{ en: "count on", ko: "의지하다", etym: "필요할 때 믿고 기댈 수 있는(count) 든든한 대상을 뜻합니다.", ex: "You can always count on your family." },
{ en: "pick up", ko: "기운을 북돋우다", etym: "떨어진 기분을 들어 올리듯(pick up) 다시 활기차게 만드는 것입니다.", ex: "The good news really picked me up." },
{ en: "real jolt", ko: "(깜짝놀랄) 큰 충격, 자극", etym: "갑작스러운 전기 충격(jolt)처럼 정신이 번쩍 들게 하는 자극입니다.", ex: "The caffeine gave me a real jolt." },
{ en: "levy a tariff on", ko: "~에 관세를 부과하다", etym: "정부가 수입품 등에 세금(tariff)을 징수(levy)하는 행위입니다.", ex: "The US decided to levy a tariff on steel imports." },
{ en: "trickle down to", ko: "전가되다", etym: "위에서 아래로 물이 흐르듯(trickle) 비용이나 영향이 소비자에게 전달됨을 뜻합니다.", ex: "The tax cuts will eventually trickle down to the poor." },
{ en: "upward of", ko: "(숫자) ~이상으로, 최소한 ~넘게", etym: "기준점에서 위쪽(upward)으로 향하여 그 수를 상회한다는 뜻입니다.", ex: "The repair will cost upward of $500." },
{ en: "stave off", ko: "~를 늦추다, 막다", etym: "말뚝(stave)으로 밀어내듯 위험이나 나쁜 상황이 오지 못하게 방어하는 것입니다.", ex: "We need to stave off the flu this winter." },
{ en: "build in", ko: "~를 반영하다, 포함하다", etym: "계획이나 구조 속에 처음부터 집어넣어(build) 일체화하는 것입니다.", ex: "You should build in some time for breaks." },
{ en: "stockpile", ko: "(비상용으로) 비축하다", etym: "재고(stock)를 쌓아놓은(pile) 것처럼 만약의 사태를 위해 모아두는 것입니다.", ex: "The country is starting to stockpile oil." },
{ en: "compromise on", ko: "~을 타협하다, 양보하다", etym: "자신의 원칙을 조금 굽히고 상대와 합의(compromise)를 보는 지점입니다.", ex: "We cannot compromise on the safety of our children." },


{ en: "even in lean time", ko: "힘든 시기에도", etym: "수확이 적어 고기가 없고 '야윈(lean)' 시기, 즉 불경기나 어려운 때를 의미합니다.", ex: "True friends stay together even in lean times." },
{ en: "feel a crunch", ko: "경제적 압박을 받다", etym: "무언가에 꽉 끼여 으스러지는(crunch) 듯한 고통스러운 경제 상황입니다.", ex: "Small businesses are starting to feel a crunch." },
{ en: "catch on", ko: "유행하다, 퍼지다", etym: "갈고리가 걸리듯(catch) 사람들의 마음을 사로잡아 인기를 얻는 모습입니다.", ex: "I didn't think this fashion would catch on so fast." },
{ en: "I can’t be bother", ko: "귀찮아..", etym: "무언가에 방해받거나(bother) 신경 쓰고 싶지 않을 만큼 의욕이 없는 상태입니다.", ex: "I can't be bothered to cook dinner tonight." },
{ en: "side hustle", ko: "부업, 투잡", etym: "본업 옆(side)에서 열정적으로(hustle) 돈을 버는 활동입니다.", ex: "My side hustle is selling handmade jewelry." },
{ en: "turn into a living", ko: "생계가 되다, 생활이 되다", etym: "취미나 부업이 점차 변하여 주된 수입원(living)이 되는 과정입니다.", ex: "He turned his love for cooking into a living." },
{ en: "lucrative", ko: "수익성이 좋음, 돈벌이가 되는", etym: "라틴어 lucrum(이익)에서 유래하여, 돈을 많이 벌어다 주는 것을 뜻합니다.", ex: "Investing in real estate can be very lucrative." },
{ en: "On call", ko: "당직 근무 중인", etym: "전화로 부르면(call) 언제든 즉시 현장으로 나가야 하는 대기 상태입니다.", ex: "The doctor is on call this weekend." },
{ en: "first thing in the morning", ko: "아침 제일 먼저", etym: "일어나자마자 가장 첫 번째(first thing)로 해야 할 일을 강조합니다.", ex: "Call me first thing in the morning." },
{ en: "why should it be this hard", ko: "왜 이렇게까지 어려워야 하는 건가?", etym: "상황이 비합리적으로 복잡하거나 힘들 때 던지는 한탄 섞인 질문입니다.", ex: "Getting a simple refund—why should it be this hard?" },
{ en: "have a tough time ~ing", ko: "~하는데 어려움을 겪다", etym: "어떤 행동을 하는 과정이 거칠고(tough) 힘들다는 뜻입니다.", ex: "I'm having a tough time finding a new job." },
{ en: "swipe (a) card", ko: "카드를 긁다", etym: "결제 단말기에 카드를 휙(swipe) 지나가게 하는 동작에서 유래했습니다.", ex: "Just swipe your card to open the door." },
{ en: "sort (sth) out", ko: "문제를 정리하다, 해결하다", etym: "어질러진 것들을 종류별로 분류(sort)해서 밖으로(out) 깔끔히 정리한다는 뜻입니다.", ex: "We need to sort out the travel details." },
{ en: "sketchy", ko: "수상한, 믿기 어려운", etym: "완성된 그림이 아니라 밑그림(sketch)만 있어 세부 내용이 불분명하고 불안한 상태입니다.", ex: "That website looks a bit sketchy; don't enter your password." },
{ en: "I won’t take no for an answer", ko: "아니오라는 대답을 받지 않을 것이다", etym: "거절은 고려하지 않겠다는 강한 의지나 권유를 나타냅니다.", ex: "You're coming to the party; I won't take no for an answer." },
{ en: "beer goggles", ko: "술에 취해 콩깍지가 씌다", etym: "맥주(beer)를 마셔 안경(goggles)을 쓴 것처럼 세상이 다 예뻐 보인다는 유머러스한 비유입니다.", ex: "He must have been wearing beer goggles when he met her." },
{ en: "breadwinner", ko: "가장, 생계를 책임지는 사람", etym: "가족이 먹을 빵(bread)을 벌어오는(winner) 사람이라는 뜻입니다.", ex: "She became the sole breadwinner after her father retired." },
{ en: "divvy it up", ko: "(돈, 비용 등을) 나누다", etym: "나누다(divide)라는 말을 친근하고 가볍게 표현한 구어체입니다.", ex: "Let's divvy up the prize money equally." },
{ en: "after the fact", ko: "일이 끝난 뒤에", etym: "어떤 사건(fact)이 이미 벌어지고 난 이후를 뜻합니다.", ex: "There's no point in complaining after the fact." },
{ en: "along the way", ko: "그 과정에, 도중에", etym: "길을 따라가는 과정(way) 중에 발생하는 일들을 의미합니다.", ex: "I made many friends along the way." },
{ en: "frantically", ko: "미친듯이, 정신없이, 필사적으로", etym: "미친 사람처럼(frantic) 극도로 흥분하거나 서둘러 움직이는 모습입니다.", ex: "He searched frantically for his lost car keys." },
{ en: "square up", ko: "(비용, 빚 등을) 정산하다", etym: "서로 주고받을 것을 계산해 관계를 정사각형(square)처럼 반듯하게 만든다는 뜻입니다.", ex: "Wait, let me square up with you for the coffee." },
{ en: "by the end of", ko: "~가 끝날 때까지, 끝나기 전에", etym: "특정 시점이 종료되는 지점을 한계선으로 정하는 표현입니다.", ex: "Please finish the report by the end of the day." },
{ en: "split expenses", ko: "비용을 나누다", etym: "지출(expenses)을 조각내어(split) 각자 부담한다는 의미입니다.", ex: "We usually split expenses when we travel together." },
{ en: "splurge on something", ko: "(무언가에) 돈을 아낌 없이 쓰다, 사치하다", etym: "평소보다 훨씬 많은 돈을 펑펑 쓰는 행위를 묘사합니다.", ex: "I decided to splurge on a fancy dinner." },
{ en: "get out of the gate", ko: "시작하다, 출발하다", etym: "경주마가 출발 게이트를 박차고 나오듯 힘차게 일을 시작하는 모습입니다.", ex: "The new product got out of the gate with strong sales." },
{ en: "procrastination", ko: "미루는 버릇, 꾸물거림, 연기", etym: "라틴어 cras(내일)에서 유래하여, 계속 내일로 미루는 성향을 뜻합니다.", ex: "Procrastination is my biggest weakness." },
{ en: "It’s matter to me", ko: "나한테는 중요해", etym: "그 일이 나에게 실질적인 비중(matter)을 차지한다는 강조입니다.", ex: "It matters to me what you think." },
{ en: "coming attractions", ko: "영화 예고편", etym: "곧 다가올(coming) 매력적인(attractions) 볼거리라는 뜻입니다.", ex: "The coming attractions looked better than the actual movie." },
{ en: "that’s how I roll", ko: "난 원래 그래, 내 방식이야", etym: "자신의 인생이나 스타일을 굴려가는(roll) 특유의 방식을 뜻합니다.", ex: "I always tip 30%; that's how I roll." },
{ en: "take over", ko: "장악하다, 지배하다", etym: "다른 사람이 가진 것을 넘겨받아(take) 자신의 통제하에 두는 것입니다.", ex: "The rebels tried to take over the government." },
{ en: "you know the drill", ko: "너 방법 알잖아, 늘 하던 거잖아", etym: "반복적인 훈련(drill)처럼 뻔한 절차를 이미 숙지하고 있다는 뜻입니다.", ex: "Grab your gear and get in line—you know the drill." },
{ en: "that’s enough out of you", ko: "너 그만 말해", etym: "너에게서 나올(out of you) 말은 이제 충분하니(enough) 입을 다물라는 뜻입니다.", ex: "That's enough out of you! I don't want to hear more excuses." },
{ en: "you had me worried", ko: "너 때문에 걱정했어", etym: "너의 행동이 나를 걱정하는 상태(worried)로 만들었다는 뜻입니다.", ex: "Where were you? You had me worried sick." },
{ en: "gouge", ko: "바가지 씌우다, 폭리를 취하다", etym: "끌(gouge)로 파내듯 상대의 지갑에서 돈을 억지로 파내는 비유입니다.", ex: "Gas stations often gouge customers during holidays." },
{ en: "pivot", ko: "전략을 전환하다", etym: "축을 중심으로 회전하는 농구 기술처럼, 중심은 유지하되 방향을 바꾸는 것입니다.", ex: "The startup had to pivot to a new business model." },
{ en: "anywhere from A to B", ko: "대충 이정도 사이이다", etym: "범위가 A와 B 사이 어디쯤에 위치한다는 대략적인 수치 표현입니다.", ex: "The repair will take anywhere from two to four days." },
{ en: "gone from A to B", ko: "A에서 B로 변하다", etym: "상태나 양상이 한 지점에서 다른 지점으로 완전히 이동했다는 뜻입니다.", ex: "Their relationship has gone from friends to enemies." },
{ en: "feel the squeeze", ko: "압박을 받다, 경제적으로 힘들어하다", etym: "주변 상황이 나를 꽉 쥐어짜는(squeeze) 듯한 압박감을 느낀다는 뜻입니다.", ex: "Middle-class families are feeling the squeeze of inflation." },
{ en: "drain your wallet", ko: "지갑을 바닥내다, 돈을 탕진하다", etym: "지갑에 있는 돈을 물처럼 다 빼내어(drain) 비워버린다는 비유입니다.", ex: "Maintaining a luxury car will drain your wallet." },
{ en: "sticker shock", ko: "가격표 충격", etym: "가격표(sticker)에 적힌 숫자를 보고 너무 비싸서 충격(shock)을 받는 상황입니다.", ex: "I had real sticker shock when I saw the price of the house." },
{ en: "all hype", ko: "실제보다 부풀려진, 과장의", etym: "실속은 없는데 광고나 소문(hype)만 무성한 상태를 뜻합니다.", ex: "The new restaurant was all hype; the food was just okay." },
{ en: "signal trouble ahead", ko: "앞으로 문제가 생길 조짐을 보이다", etym: "앞길(ahead)에 문제가 있음을 알려주는 신호(signal) 역할을 한다는 뜻입니다.", ex: "The low sales figures signal trouble ahead for the company." },


{ en: "all those in favor?", ko: "찬성하는 사람?", etym: "회의나 투표에서 특정 안건에 찬성(favor)하는 사람을 거수 등으로 확인할 때 씁니다.", ex: "All those in favor, please raise your hands." },
{ en: "you had it coming", ko: "니가 자초한 일이야", etym: "네가 한 행동의 대가로 당연히 올(coming) 것이 왔다는 차가운 일침입니다.", ex: "You were late every day and got fired; you had it coming." },
{ en: "it’s your call", ko: "니가 결정해, 너한테 달렸어", etym: "심판의 판정(call)처럼 최종 결정권이 상대에게 있음을 뜻합니다.", ex: "We can go to the beach or the park; it's your call." },
{ en: "i’m not in the mood", ko: "그럴 기분 아니야", etym: "현재의 마음 상태(mood)가 특정 행동을 하고 싶지 않은 상태임을 나타냅니다.", ex: "I'm not in the mood to go out dancing tonight." },
{ en: "facilitate", ko: "용이하게 하다", etym: "라틴어 facilis(쉬운)에서 유래하여, 일을 더 쉽고 원활하게 진행되도록 돕는 것입니다.", ex: "The new software will facilitate faster communication." },
{ en: "vulnerabilities", ko: "취약성", etym: "공격이나 상처를 입기 쉬운 약점을 뜻합니다.", ex: "The hackers exploited vulnerabilities in the system." },
{ en: "interconnectedness", ko: "상호연결성", etym: "서로(inter-)가 복잡하게 연결(connected)되어 영향을 주고받는 성질입니다.", ex: "The pandemic showed the interconnectedness of the global economy." },
{ en: "crack down on", ko: "단속하다, 엄격히 규제하다", etym: "채찍을 휘두를 때 나는 소리(crack)처럼 강하게 억누르고 단속하는 모습입니다.", ex: "The city is cracking down on illegal parking." },
{ en: "press pause on", ko: "~을 잠시 멈추다", etym: "재생 중인 영상의 일시정지(pause) 버튼을 누르듯 진행 중인 일을 중단하는 것입니다.", ex: "The company decided to press pause on the new project." },
{ en: "you don’t have to squint to see it", ko: "굳이 노력하지 않아도 명백히 보인다", etym: "눈을 가늘게 뜨고(squint) 자세히 보지 않아도 될 만큼 증거가 확실하다는 뜻입니다.", ex: "The economy is failing; you don't have to squint to see it." },
{ en: "get in", ko: "주문한 것이 도착하다", etym: "배송된 물건이나 소포가 건물 안(in)으로 들어왔음을 의미합니다.", ex: "The new stock should get in by tomorrow morning." },
{ en: "creep back up", ko: "서서히 오르다", etym: "살금살금 기어가듯(creep) 가격이나 수치가 다시 조금씩 오르는 모습입니다.", ex: "Gas prices are starting to creep back up." },
{ en: "progress is being made", ko: "진전이 이뤄지고 있다", etym: "어떤 일의 단계나 목표를 향해 조금씩 나아가고(progress) 있는 상태입니다.", ex: "It's slow, but progress is being made." },
{ en: "bombard", ko: "(공격을, 질문을) 퍼붓다", etym: "대포(bombard)를 쏘듯 질문이나 요청을 쉴 새 없이 쏟아내는 행위입니다.", ex: "Fans bombarded the actor with questions." },
{ en: "complimentary", ko: "무료의", etym: "호의로 제공되는 칭찬(compliment) 같은 무료 서비스라는 뜻입니다.", ex: "The hotel offers a complimentary breakfast." },
{ en: "freaked out", ko: "식겁하다, 멘붕이다", etym: "갑작스러운 공포나 놀라움으로 정신이 나갈 것 같은 흥분 상태입니다.", ex: "I totally freaked out when I saw the spider." },
{ en: "wrap your head around something", ko: "복잡하거나 충격적인 사실을 받아들이다, 이해하다", etym: "너무 거대하거나 복잡해서 머리(head)로 감싸기(wrap) 힘들 정도로 이해하기 어렵다는 뜻입니다.", ex: "I'm trying to wrap my head around this new concept." },
{ en: "depletion", ko: "소진 감소 고갈", etym: "비우다(plere)라는 뜻에서 유래하여, 자원이나 에너지가 다 빠져나가는 것입니다.", ex: "The depletion of the ozone layer is a serious issue." },
{ en: "elite, proper", ko: "야무지다, 굳이다", etym: "영국 속어 등에서 아주 훌륭하고 제대로(proper) 된 상태를 칭찬할 때 씁니다.", ex: "That was an elite performance; absolutely proper." },
{ en: "represent", ko: "나타내다, 상징하다", etym: "대상을 대신해서 서 있거나(present) 그 가치를 보여준다는 뜻입니다.", ex: "Each color on the map represents a different country." },
{ en: "collective", ko: "집단의, 공동의, 집단(명)", etym: "여럿이 함께 모여(collect) 하나로 움직이는 성격입니다.", ex: "The decision was based on our collective effort." },
{ en: "environmentally conscious", ko: "환경을 생각하는, 환경 친화적인", etym: "환경을 보호해야 한다는 의식(conscious)을 가지고 행동하는 상태입니다.", ex: "We are trying to be more environmentally conscious." },
{ en: "eco-friendly", ko: "친환경적인 성질", etym: "생태계(eco)에 우호적(friendly)이고 해를 끼치지 않는 특성입니다.", ex: "These straws are made of eco-friendly materials." },
{ en: "ecological", ko: "생태학적", etym: "생물과 환경의 유기적인 관계(ecology)와 관련된 학문적/실무적 관점입니다.", ex: "The oil spill caused an ecological disaster." },
{ en: "indicative", ko: "~을 나타내는, 보여주는/시사하는", etym: "어떤 사실을 가리키고(indicate) 암시하는 성질이 있음을 뜻합니다.", ex: "His silence is indicative of his guilt." },
{ en: "distraction", ko: "방해, 산만하게 하는 것", etym: "주의를 딴 데로 끌어당겨(tract) 집중을 흐트러뜨리는 요소입니다.", ex: "I need to study in a place with no distractions." },
{ en: "sleep on it", ko: "천천히 생각해봐", etym: "잠(sleep)을 한숨 자고 다음 날 결정할 만큼 시간을 두고 신중히 생각하라는 조언입니다.", ex: "Don't decide now; sleep on it and tell me tomorrow." },
{ en: "what a steal", ko: "완전 거저네!", etym: "훔친(steal) 것처럼 느껴질 정도로 가격이 너무 저렴할 때 쓰는 감탄입니다.", ex: "I bought this jacket for $10. What a steal!" },
{ en: "save it", ko: "됐어. 됐고, 말하지마 (공격적)", etym: "네 말이나 변명을 아껴서(save) 네 입속에나 담아두라는 거친 표현입니다.", ex: "Save it! I don't want to hear your excuses." },
{ en: "forget it, never mind", ko: "신경 쓰지마 (중립적/공손)", etym: "방금 한 말이나 실수를 잊어버리라(forget)는 뜻으로 상황을 넘길 때 씁니다.", ex: "I forgot what I was going to say. Never mind." },
{ en: "Let’s drop it, that’s enough", ko: "그만하자 (중립적/공손)", etym: "논쟁이나 화제를 바닥에 내려놓고(drop) 여기서 끝내자는 제안입니다.", ex: "We're not going to agree, so let's drop it." },
{ en: "split up", ko: "나누다", etym: "하나의 집단이나 물건을 쪼개어(split) 여러 개로 분리하는 동작입니다.", ex: "Let's split up the tasks among the team members." },
{ en: "skewer", ko: "꽂다", etym: "꼬챙이(skewer)로 음식을 꿰는 동작, 혹은 누군가를 날카롭게 비판하는 모습입니다.", ex: "The chef skewed the meat and vegetables." },
{ en: "sprinkle", ko: "뿌리다", etym: "가루나 액체를 작은 방울이나 입자로 흩뿌리는 동작입니다.", ex: "Sprinkle some cheese on top of the pizza." },
{ en: "bite into", ko: "베어 먹다", etym: "치아를 음식 안(into)으로 깊게 박아 한 입 깨무는 동작입니다.", ex: "The apple was so juicy when I bit into it." },
{ en: "slay", ko: "멋지다, 끝내준다", etym: "적을 압도적으로 물리치다(slay)는 뜻에서 유래하여, 아주 쿨하고 멋지게 해냈음을 뜻하는 MZ 은어입니다.", ex: "You slay in that outfit!" },
{ en: "she ate that", ko: "쩔었다, 완전 잘했어", etym: "제시된 과제나 스타일을 완벽히 흡수하여 '먹어치웠다'는 뜻의 MZ 찬사입니다.", ex: "Did you see her dance performance? She ate that!" },
{ en: "No cap", ko: "진짜야, 농담아니야, 거짓 아님", etym: "거짓말(cap)이 없다는 뜻으로, 자신의 말이 진실임을 맹세할 때 쓰는 MZ 슬랭입니다.", ex: "I really saw a UFO last night, no cap." },
{ en: "I’m dead", ko: "너무 웃겨 죽겠다", etym: "너무 많이 웃어서 숨이 넘어갈 것 같고 죽을 것(dead) 같다는 비유입니다.", ex: "Look at his funny face! I'm dead." },
{ en: "It’s giving ~", ko: "~한 느낌이야", etym: "~한 분위기를 뿜어내고(giving) 있다는 뜻으로 뒤에 분위기나 대상을 붙여 씁니다.", ex: "It's giving CEO vibes." },
{ en: "familiar with", ko: "~에 정통한, 잘 아는", etym: "가족(family)처럼 가깝고 익숙해서 잘 알고 있다는 뜻입니다.", ex: "Are you familiar with this software?" },
{ en: "be characterized as", ko: "~로 묘사되다", etym: "특정한 성격(character)이나 특징으로 규정되고 설명되는 방식입니다.", ex: "His style can be characterized as modern and minimal." },
{ en: "expat", ko: "국외 거주자", etym: "자국(patria)을 떠나서(ex-) 외국에 살고 있는 사람을 줄여 부르는 말입니다.", ex: "There is a large community of expats in Seoul." },
{ en: "Gentrification", ko: "젠트리피케이션", etym: "낙후된 지역이 개발되면서 임대료가 올라 원주민이 쫓겨나는 현상입니다.", ex: "Gentrification is changing the face of the neighborhood." },
{ en: "I’m kinda sick of it", ko: "솔직히 좀 질렸어", etym: "너무 반복되거나 과해서 병(sick)이 날 정도로 싫증이 났다는 뜻입니다.", ex: "I'm kinda sick of eating pizza every day." },
{ en: "I didn’t expect much", ko: "기대도 안했어", etym: "처음부터 큰 기대치(expect)를 가지지 않아서 실망도 없다는 뉘앙스입니다.", ex: "The movie was okay; I didn't expect much anyway." },
{ en: "I’ve said enough", ko: "더이상 할말이 없어", etym: "내 의견을 충분히(enough) 전달했으니 이제 입을 닫겠다는 단호한 태도입니다.", ex: "I've said enough. Now it's your turn to decide." },
{ en: "I need space", ko: "혼자 생각 좀 하게 해줘", etym: "주변의 간섭 없이 나만의 공간(space)과 시간이 필요하다는 정중한 요청입니다.", ex: "I'm very stressed right now; I need some space." },
{ en: "that’s in the past", ko: "이미 지나간 일이야", etym: "현재가 아닌 과거(past)의 일이니 더 이상 연연하지 말자는 뜻입니다.", ex: "Don't worry about our fight; that's in the past." },
{ en: "I’ll just ignore it", ko: "그냥 모른척 할래", etym: "알고는 있지만 대응하지 않고 무시(ignore)하겠다는 의지입니다.", ex: "People are talking behind my back, but I'll just ignore it." },
{ en: "Not as good as I thought", ko: "생각보다 별로", etym: "머릿속으로 상상했던 기준만큼 좋지(good) 않았다는 실망의 표현입니다.", ex: "The famous restaurant was not as good as I thought." },
{ en: "I didn’t expect anything", ko: "기대 안 했어", etym: "어떤 결과나 보답도 미리 바라지(expect) 않았음을 뜻합니다.", ex: "I gave him the gift, but I didn't expect anything in return." },
{ en: "low-key", ko: "은근히, 솔직히", etym: "피아노의 낮은 음자리(low key)처럼 눈에 띄지 않게 조용히 느끼는 감정을 뜻합니다.", ex: "I low-key miss my ex-boyfriend." },


{ en: "be diagnosed with", ko: "~로 진단받다", etym: "의학적으로 증상을 분석하여 특정 병명으로 결론(diagnosis)이 내려진 상태입니다.", ex: "He was diagnosed with a rare vitamin deficiency." },
{ en: "chronic", ko: "만성의", etym: "그리스어 chronos(시간)에서 유래하여, 병이 짧게 끝나지 않고 오랫동안 지속됨을 뜻합니다.", ex: "She suffers from chronic back pain." },
{ en: "venous insufficiency", ko: "정맥 부전", etym: "정맥(venous)의 기능이 충분하지(insufficiency) 않아 혈액 순환이 원활하지 않은 상태입니다.", ex: "Swollen ankles can be a sign of venous insufficiency." },
{ en: "be examined for", ko: "~에 대해 진찰을 받았다", etym: "특정 질병의 유무를 확인하기 위해 정밀하게 검사(examine)받는 상황입니다.", ex: "He went to the hospital to be examined for chest pain." },
{ en: "swelling", ko: "부종, 붓기", etym: "몸의 일부가 부어오르는(swell) 현상이나 증상을 뜻합니다.", ex: "Use an ice pack to reduce the swelling." },
{ en: "heart failure", ko: "심부전", etym: "심장이 제 기능을 다 하지 못하고 실패(failure)하여 혈액 공급이 부족해지는 중증 질환입니다.", ex: "The patient was treated for congestive heart failure." },
{ en: "arterial disease", ko: "동맥 질환", etym: "심장에서 나가는 피가 흐르는 통로인 동맥(arterial)에 생긴 병입니다.", ex: "Smoking is a major cause of arterial disease." },
{ en: "being held up", ko: "지연되고 있다, 보류 중이다", etym: "무언가가 위에서 붙잡혀(held up) 아래로 내려가지 못하고 멈춰 있는 상황입니다.", ex: "The project is being held up by a lack of funding." },
{ en: "leadership’s handling of", ko: "지도부의 ~ 처리 방식", etym: "리더들이 특정 사안을 어떻게 손(hand)을 대어 다루고 해결하는지를 뜻합니다.", ex: "Many people criticized the leadership's handling of the crisis." },
{ en: "prosecutor", ko: "(기소) 검사", etym: "법적 절차를 끝까지 밀고 나가는(prosecute) 사람, 즉 범죄를 기소하는 공무원입니다.", ex: "The prosecutor presented new evidence in court." },
{ en: "pressed on", ko: "~에 대해 질문 받다, 압박받다", etym: "상대방이 대답을 회피하지 못하게 계속해서 누르듯(press) 압박하며 묻는 것입니다.", ex: "The reporter pressed on until the politician gave an answer." },
{ en: "that’s so me", ko: "완전 내 스타일! / 딱 내 얘기네", etym: "어떤 상황이나 물건이 마치 나(me) 자신인 것처럼 아주 잘 어울리거나 공감될 때 씁니다.", ex: "Look at this lazy cat; that's so me on Sundays." },
{ en: "that’s legendary", ko: "레전드네", etym: "전설(legend)로 남을 만큼 아주 대단하거나 인상적인 상황을 뜻하는 MZ 표현입니다.", ex: "You finished the whole cake? That's legendary." },
{ en: "that hit different", ko: "기깔나네 / 느낌이 다르네", etym: "평소와는 다르게(different) 특별한 감동이나 자극을 줄 때 쓰는 표현입니다.", ex: "Eating ramen at 2 AM just hits different." },
{ en: "can’t argue with that", ko: "인정 / 반박불가", etym: "논리적으로 너무 타당해서 말싸움(argue)을 할 여지가 없음을 뜻합니다.", ex: "It's cheap and it tastes great. Can't argue with that." },
{ en: "that’s clean", ko: "간지나 / 깔끔하네", etym: "군더더기 없이 세련되고 멋진 디자인이나 기술을 칭찬할 때 씁니다.", ex: "Your new car design is so clean." },
{ en: "scrutinize", ko: "세심히 살피다, 면밀히 조사하다", etym: "작은 흠집까지 찾아내려는 듯 아주 꼼꼼하게 들여다보는 행위입니다.", ex: "The boss will scrutinize every detail of the report." },
{ en: "walk through", ko: "차근차근 단계별로 설명하다", etym: "어떤 과정을 함께 걷듯(walk) 하나하나 짚어주며 설명해 주는 것입니다.", ex: "Can you walk me through the installation process?" },
{ en: "threshold", ko: "문지방, 시작점, 기준점", etym: "방에 들어서기 위해 넘어야 하는 문턱처럼, 어떤 현상이 나타나는 경계선입니다.", ex: "The company has reached the threshold of profitability." },
{ en: "toll", ko: "사망자 수 / 통행료", etym: "재난 등으로 인한 인명 피해나 특정 대가를 치러야 하는 수치를 의미합니다.", ex: "The death toll from the earthquake continues to rise." },
{ en: "urge", ko: "강하게 권고하다", etym: "어떤 일을 하도록 뒤에서 강하게 밀어붙이거나(urge) 촉구하는 것입니다.", ex: "Doctors urge people to wash their hands frequently." },
{ en: "come to fruition", ko: "실현되다, 결실을 맺다", etym: "계획했던 일이 열매(fruit)를 맺는 단계에 도달하여 결실을 보는 것입니다.", ex: "After years of hard work, his dream finally came to fruition." },
{ en: "putting on hold", ko: "중단시키다, 보류하다", etym: "전화를 대기 상태(hold)로 두듯, 진행 중인 일을 잠시 멈추고 기다리게 하는 것입니다.", ex: "The travel plans were put on hold due to the storm." },
{ en: "unaccounted for", ko: "행방불명된, 실종된", etym: "장부나 명단에 계산(account)되지 않은, 즉 어디 있는지 파악되지 않은 상태입니다.", ex: "Several hikers are still unaccounted for after the avalanche." },
{ en: "ditch", ko: "(더 이상 불필요한 것을) 버리다", etym: "도랑(ditch)에 빠뜨려 버리듯, 필요 없는 물건이나 사람을 버리거나 차버리는 것입니다.", ex: "I decided to ditch my old phone and buy a new one." },
{ en: "condiments", ko: "뿌려먹는 소스", etym: "음식의 맛을 돋우기 위해 곁들이는 소금, 후추, 소스류 등을 총칭합니다.", ex: "Ketchup and mustard are the most common condiments." },
{ en: "take up", ko: "다루다, 논의하다", etym: "바닥에 있는 문제를 위로 집어 올려(take up) 본격적으로 검토한다는 뜻입니다.", ex: "The committee will take up the issue in the next meeting." },
{ en: "sweeping", ko: "대대적인, 전면적인", etym: "빗자루로 한 번에 쓸어버리듯(sweep) 광범위하고 포괄적인 변화를 뜻합니다.", ex: "The new CEO announced sweeping changes to the company." },
{ en: "cast the tie-breaking vote", ko: "동점 상황에서 결정표를 던지다", etym: "찬반이 같을(tie) 때 그 균형을 깨는(breaking) 마지막 한 표를 던지는 것입니다.", ex: "The vice president cast the tie-breaking vote." },
{ en: "holdout", ko: "끝까지 반대하는 사람", etym: "남들이 다 동의할 때 혼자 밖에서 버티고(hold out) 있는 사람입니다.", ex: "He was the only holdout in the contract negotiations." },

{ en: "Misstep", ko: "실수, 잘못된 조치", etym: "발을 잘못(mis-) 디딘(step) 것처럼 결정적인 순간에 범한 실수를 뜻합니다.", ex: "One minor misstep could ruin the entire plan." },

{ en: "Bring about", ko: "초래하다", etym: "어떤 변화나 결과를 주변(about)으로 가져와서(bring) 발생시킨다는 뜻입니다.", ex: "The new law brought about many social changes." },

{ en: "Crackdown", ko: "엄중 단속", etym: "불법 행위를 강하게 내리찍어(crack down) 잡는 행위 그 자체를 의미하는 명사입니다.", ex: "The police began a crackdown on drunk driving." },
{ en: "Retaliation", ko: "보복 앙갚음", etym: "당한 것과 똑같은(tali-) 방식으로 되돌려 주는 보복 행위입니다.", ex: "The government promised retaliation for the cyberattack." },
{ en: "Trip up", ko: "실수를 하도록 유도하다", etym: "발을 걸어 넘어뜨리듯(trip) 상대방이 실수하게 만드는 교묘한 행동입니다.", ex: "The interviewer tried to trip him up with difficult questions." },
{ en: "For much of the past time", ko: "지난 시간의 대부분 동안", etym: "과거 기간 중 꽤 많은(much) 비중을 차지하는 시간 동안을 뜻합니다.", ex: "For much of the past year, I worked from home." },
{ en: "Don’t get your hopes up", ko: "너무 기대하지 마", etym: "기대치(hopes)를 높게(up) 올렸다가 나중에 실망할 수 있으니 주의하라는 뜻입니다.", ex: "You might get the job, but don't get your hopes up yet." },
{ en: "Flamboyant", ko: "대담한, 이색적", etym: "불꽃(flamb-)처럼 화려하고 눈에 확 띄는 독특한 스타일을 의미합니다.", ex: "He is known for his flamboyant stage costumes." },
{ en: "Burn through", ko: "(빠른 속도로) 다 써버리다", etym: "돈이나 에너지를 불태우듯(burn) 아주 빠르게 소모해버리는 모습입니다.", ex: "We burned through our budget in just one month." },
{ en: "Churn out", ko: "대량생산하다", etym: "버터를 만드는 기구(churn)를 돌려 계속 뽑아내듯 물건이나 글을 쉴 새 없이 만들어내는 것입니다.", ex: "The studio churns out three movies a year." },
{ en: "iteration", ko: "(계산 처리 절차의) 반복", etym: "더 나은 결과를 위해 같은 과정을 여러 번 다시 시도하거나 개선해 나가는 반복 단계를 뜻합니다.", ex: "The software is improved with each iteration." }];




    
    
    
    

    let myData = JSON.parse(localStorage.getItem('etym_voca_custom')) || [];
    let combinedData = [...baseData, ...myData];
    let currentIndex = 0;
    let knownWords = JSON.parse(localStorage.getItem('etym_known')) || [];
    let favorites = JSON.parse(localStorage.getItem('etym_favs')) || [];

    function updateStats() {
        const pool = combinedData.filter(w => !knownWords.includes(w.en));
        document.getElementById('progress-text').innerText = `남은 단어: ${pool.length} / 전체: ${combinedData.length}`;
    }

    function nextWord() {
        const pool = combinedData.filter(w => !knownWords.includes(w.en));
        if (pool.length === 0) { alert("모든 단어 마스터!"); return; }
        const nextItem = pool[Math.floor(Math.random() * pool.length)];
        currentIndex = combinedData.findIndex(w => w.en === nextItem.en);
        
        document.getElementById('word').innerText = nextItem.en;
        
        // 상단 박스 숨김 상태로 리셋
        document.getElementById('etym-box').style.visibility = 'hidden';
        document.getElementById('mean-box').style.visibility = 'hidden';
        document.getElementById('ex-box').style.visibility = 'hidden';
        
        document.getElementById('fav-btn').classList.toggle('active', favorites.includes(nextItem.en));
        updateStats();
    }

    function showEtymology() {
        const box = document.getElementById('etym-box');
        box.innerText = "📜 " + (combinedData[currentIndex].etym || "어원 정보가 없습니다.");
        box.style.visibility = 'visible';
    }

    function showContent() {
        const mBox = document.getElementById('mean-box');
        const eBox = document.getElementById('ex-box');
        const item = combinedData[currentIndex];
        
        mBox.innerText = item.ko;
        eBox.innerHTML = `<strong>Ex:</strong> ${item.ex || '등록된 예문이 없습니다.'}`;
        
        mBox.style.visibility = 'visible';
        eBox.style.visibility = 'visible';
    }

    function speak() {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(combinedData[currentIndex].en);
        const voices = window.speechSynthesis.getVoices();
        const nativeVoice = voices.find(v => v.name === 'Google US English') || voices.find(v => v.lang === 'en-US');
        if (nativeVoice) msg.voice = nativeVoice;
        msg.rate = 0.88;
        window.speechSynthesis.speak(msg);
    }

    function markAsKnown() {
        knownWords.push(combinedData[currentIndex].en);
        localStorage.setItem('etym_known', JSON.stringify(knownWords));
        nextWord();
    }

    function toggleFavorite() {
        const word = combinedData[currentIndex].en;
        if (favorites.includes(word)) favorites = favorites.filter(f => f !== word);
        else favorites.push(word);
        localStorage.setItem('etym_favs', JSON.stringify(favorites));
        document.getElementById('fav-btn').classList.toggle('active');
    }

    function openModal() { document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    
    function addNewWord() {
        const en = document.getElementById('new-en').value.trim();
        const ko = document.getElementById('new-ko').value.trim();
        const etym = document.getElementById('new-etym').value.trim();
        const ex = document.getElementById('new-ex').value.trim();
        if (!en || !ko) return;
        myData.push({ en, ko, etym, ex });
        localStorage.setItem('etym_voca_custom', JSON.stringify(myData));
        combinedData = [...baseData, ...myData];
        closeModal();
        updateStats();
    }

    function resetData() { if(confirm("학습 기록을 지울까요?")) { localStorage.clear(); location.reload(); } }

    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    nextWord();
</script>
