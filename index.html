<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini Voca Pro</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --accent: #f59e0b; --etym: #059669; --box-bg: #f1f5f9; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; -webkit-font-smoothing: antialiased; }
        
        .container { width: 92%; max-width: 400px; background: white; padding: 20px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; position: relative; }
        
        /* [상단 정보 박스 공통 포맷] */
        .info-display-container {
            width: 100%;
            min-height: 140px; /* 고정 높이로 흔들림 방지 */
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .info-box {
            background: var(--box-bg);
            border-radius: 12px;
            padding: 12px;
            font-size: 0.85rem;
            line-height: 1.5;
            color: #475569;
            text-align: left;
            min-height: 45px;
            display: flex;
            align-items: center;
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease;
        }

        /* 어원/뜻/예문 각각의 강조색 */
        #etym-box { border-left: 4px solid var(--etym); background: #f0fdf4; color: #134e4a; visibility: hidden; }
        #mean-box { border-left: 4px solid var(--primary); background: #eef2ff; color: #3730a3; font-weight: 700; font-size: 1rem; justify-content: center; visibility: hidden; }
        #ex-box { border-left: 4px solid #94a3b8; background: #f8fafc; visibility: hidden; }

        .placeholder-box { color: #cbd5e1; font-weight: 500; font-size: 0.8rem; justify-content: center; border: 1px dashed #e2e8f0; background: transparent; }

        /* 단어 스타일 */
        #word { font-size: 2.3rem; font-weight: 800; color: #1e293b; margin: 10px 0; letter-spacing: -1px; }
        
        /* 버튼 시스템 (한 줄 배치) */
        .control-btns { display: flex; gap: 6px; margin-top: 15px; justify-content: center; }
        button { border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        
        .btn-small { flex: 1; padding: 12px 2px; font-size: 0.8rem; }
        .btn-etym { background: var(--etym); color: white; }
        .btn-view { background: #1e293b; color: white; }
        .btn-audio { background: #eef2ff; color: #4f46e5; }
        
        .btn-next { width: 100%; background: var(--primary); color: white; padding: 16px; font-size: 1.1rem; margin-top: 10px; border-radius: 12px; box-shadow: 0 4px 12px rgba(99,102,241,0.3); }
        
        /* 하단 서브 버튼 */
        .bottom-btns { margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .btn-know { background: transparent; color: #cbd5e1; padding: 5px 15px; font-size: 0.7rem; border: 1px solid #f1f5f9; border-radius: 20px; }
        .add-word-btn { background: var(--accent); color: white; padding: 12px; border-radius: 12px; font-size: 0.85rem; width: 100%; }

        .fav-star { position: absolute; top: 18px; right: 18px; font-size: 1.5rem; color: #e2e8f0; cursor: pointer; }
        .fav-star.active { color: var(--accent); }
        .stats { font-size: 0.7rem; color: #94a3b8; margin-bottom: 10px; text-align: left; }

        /* 모달 스타일 생략(기존과 동일) */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 100%; max-width: 340px; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 10px; margin: 6px 0; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div class="fav-star" id="fav-btn" onclick="toggleFavorite()">★</div>
    <div class="stats" id="progress-text">로드 중...</div>

    <div class="info-display-container">
        <div id="etym-box" class="info-box">어원 정보</div>
        <div id="mean-box" class="info-box">뜻 정보</div>
        <div id="ex-box" class="info-box">예문 정보</div>
    </div>

    <div id="word">Word</div>

    <div class="control-btns">
        <button class="btn-small btn-etym" onclick="showEtymology()">📜 어원</button>
        <button class="btn-small btn-view" onclick="showContent()">📖 뜻·예문</button>
        <button class="btn-small btn-audio" onclick="speak()">🔊 발음</button>
    </div>
    
    <button class="btn-next" onclick="nextWord()">다음 단어 (Next Word)</button>

    <div class="bottom-btns">
        <button class="btn-know" onclick="markAsKnown()">✅ 이 단어 암기 완료</button>
        <button class="add-word-btn" onclick="openModal()">+ 단어 직접 추가</button>
        <span onclick="resetData()" style="font-size:0.65rem; color:#cbd5e1; cursor:pointer;">학습 기록 초기화</span>
    </div>
</div>

<div id="modal" onclick="if(event.target == this) closeModal()">
    <div class="modal-content">
        <h3 style="margin-top:0">나만의 단어 추가</h3>
        <input type="text" id="new-en" placeholder="영어 (필수)">
        <input type="text" id="new-ko" placeholder="뜻 (필수)">
        <textarea id="new-etym" placeholder="어원/유래" rows="2"></textarea>
        <textarea id="new-ex" placeholder="예문" rows="2"></textarea>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button onclick="closeModal()" style="flex:1; padding:10px; background:#f1f5f9; border-radius:8px;">취소</button>
            <button onclick="addNewWord()" style="flex:1; padding:10px; background:var(--primary); color:white; border-radius:8px;">저장</button>
        </div>
    </div>
</div>

<script>
    const baseData = [
{ en: "The unthinkable", ko: "차마 못할 일, 차마 못할 짓", etym: "생각조차(think) 할 수 없는(un-) 끔찍하거나 불가능한 일을 뜻합니다.", ex: "They were forced to do the unthinkable to survive." },
{ en: "pooch", ko: "강아지", etym: "강아지를 부르는 귀엽고 친근한 구어체 표현입니다.", ex: "I take my pooch for a walk every morning." },
{ en: "stroll up to", ko: "~로 한가롭게 다가가다", etym: "서두르지 않고 산책하듯(stroll) 여유롭게 접근하는 모습입니다.", ex: "He strolled up to the counter and placed his order." },
{ en: "for what it’s worth, I’m sorry", ko: "지금와서 의미 없을 수도 있지만, 미안해", etym: "자신의 사과가 상대에게 얼마나 가치(worth) 있을지 모르겠지만 진심을 전할 때 씁니다.", ex: "For what it's worth, I'm sorry for what happened last year." },
{ en: "feel the pinch", ko: "경제적 압박을 느끼다", etym: "누군가에게 살을 꼬집히는(pinch) 것처럼 부족한 예산으로 고통받는 상황입니다.", ex: "Many families are starting to feel the pinch due to rising prices." },
{ en: "generic", ko: "마트 상품, PB상품", etym: "특정 브랜드 이름이 없는 일반적인(general) 제품을 의미합니다.", ex: "I usually buy generic brands to save money." },
{ en: "stick to it", ko: "그것을 지키다, 고수하다", etym: "풀로 붙인 듯(stick) 자신의 계획이나 원칙을 떼지 않고 유지한다는 뜻입니다.", ex: "It’s a tough diet, but you have to stick to it." },
{ en: "simply put", ko: "간단히 말해서", etym: "복잡한 내용을 쉬운 말로 놓아(put) 설명한다는 의미입니다.", ex: "Simply put, we don't have enough money for this." },
{ en: "I call the shots", ko: "내가 결정한다, 내가 지휘한다", etym: "사격이나 경기에서 발사(shot)를 지시하는 사람에서 유래하여 결정권을 가짐을 뜻합니다.", ex: "In this office, I'm the one who calls the shots." },
{ en: "Don’t sell yourself short", ko: "스스로를 과소평가하지마", etym: "자신의 가치를 실제보다 낮게 책정하여(short) 팔지 말라는 비유입니다.", ex: "You're very talented; don't sell yourself short." },
{ en: "pick up on", ko: "알아차리다, 눈치채다, 캐치하다", etym: "공중에 떠다니는 미묘한 신호를 집어 올리듯(pick up) 알아챈다는 뜻입니다.", ex: "She failed to pick up on his sarcasm." },
{ en: "in what may be", ko: "아마도 ~일 수 있는 것에서", etym: "추측을 나타내는 may be를 사용해 확실치 않지만 가능성 있는 상황을 정중히 말합니다.", ex: "In what may be the biggest deal of the year, the two companies merged." },
{ en: "evolve to", ko: "~하도록 진화하다", etym: "시간이 흐르며 환경에 맞게 형태나 기능이 점진적으로 변하는 과정입니다.", ex: "Some animals evolved to survive in extreme cold." },
{ en: "look to", ko: "~에게 기대하다, 의지하다", etym: "방향을 그쪽으로 보고(look) 도움이나 답을 구한다는 의미입니다.", ex: "We look to the government for better solutions." },
{ en: "meant to be", ko: "운명이다, 그렇게하기로 되어 있다", etym: "그렇게 되도록 이미 정해진(meant) 상태라는 뜻입니다.", ex: "If it's meant to be, it will happen." },
{ en: "it’s invasive", ko: "이건 사생활 침해에요", ko: "사생활 침해", etym: "권리나 영역을 침범(invade)하여 불편함을 주는 상태입니다.", ex: "The new security cameras feel very invasive." },
{ en: "sentiment", ko: "감정, 정서", etym: "특정 사안에 대해 느끼는(sent) 대중이나 개인의 마음가짐입니다.", ex: "Public sentiment toward the project is very positive." },
{ en: "staggering", ko: "충격적인", etym: "너무 놀라 비틀거릴(stagger) 정도로 엄청나고 충격적인 상태입니다.", ex: "The cost of the repair was staggering." },
{ en: "be hit big time", ko: "큰 타격을 입다", etym: "가장 중요한 시간대(big time)에 맞은 것처럼 심각하게 당했다는 강조 표현입니다.", ex: "The tourism industry was hit big time last year." },
{ en: "top of mind", ko: "가장 먼저 떠오르는, 최대 관심사인", etym: "머릿속(mind) 가장 꼭대기(top)에 있어 언제든 생각나는 상태입니다.", ex: "Safety is top of mind for all our employees." },
{ en: "get to the till", ko: "계산대에 접근하다, 계산하다", etym: "영국식 영어에서 계산대(till)로 가서 결제를 시도하는 동작입니다.", ex: "I realized I forgot my wallet when I got to the till." },
{ en: "all sorts of benefits", ko: "온갖 종류의 혜택", etym: "종류(sorts)를 가리지 않고 다양한 이득이 제공됨을 뜻합니다.", ex: "The job comes with all sorts of benefits." },
{ en: "make a bet on", ko: "~에 내기를 걸다, ~을 담보로 도박하다", etym: "어떤 결과에 돈을 걸듯(bet) 위험을 감수하고 투자함을 의미합니다.", ex: "Investors are making a bet on the new tech startup." },
{ en: "second guess", ko: "다시 생각하다, 망설이다", etym: "이미 한 결정에 대해 두 번째(second)로 추측하며 의심하는 모습입니다.", ex: "Don't second-guess yourself; your first instinct was right." },
{ en: "stock up", ko: "비축하다, 쟁여두다, 사재기하다", etym: "나중을 위해 재고(stock)를 가득 채워(up) 두는 행동입니다.", ex: "We should stock up on water before the storm." },
{ en: "in the fact that", ko: "~라는 점에서, ~라는 사실 때문에", etym: "특정한 사실(fact)을 근거로 제시할 때 쓰는 문구입니다.", ex: "The strength of the film lies in the fact that it's a true story." },
{ en: "charge A to B", ko: "A를 B로 결제하다/A를 B 앞으로 달아놓다", etym: "청구 금액(charge)을 특정 계정이나 카드(B)로 돌리는 행위입니다.", ex: "Please charge the dinner to my room number." },
{ en: "there’s a good chance", ko: "~할 가능성이 높다", etym: "충분히 좋은(good) 확률(chance)이 존재한다는 긍정적 추측입니다.", ex: "There's a good chance that it will rain today." },
{ en: "contrary to", ko: "~와는 반대로", etym: "제시된 내용과 대조되는(contra) 상황을 설명할 때 씁니다.", ex: "Contrary to popular belief, cats can be very friendly." },
{ en: "401k", ko: "미국 개인연금 (폴오원케이)", etym: "미국 내국세법 401조 k항에 정의된 퇴직연금 제도에서 유래했습니다.", ex: "I need to start contributing more to my 401k." },
{ en: "a thing of the past", ko: "유물, 거의 사라진 것", etym: "현재는 없고 과거(past)에나 존재하던 물건이나 현상을 뜻합니다.", ex: "Public payphones are mostly a thing of the past." },
{ en: "virtually", ko: "사실상, 거의", etym: "완벽히는 아니더라도 가상(virtual)의 경계가 무너질 만큼 실제와 다름없다는 뜻입니다.", ex: "The task is virtually impossible to finish today." },
{ en: "dodgy", ko: "위태로운", etym: "이리저리 피해야(dodge) 할 정도로 수상하거나 품질이 낮은 상태입니다.", ex: "The internet connection here is a bit dodgy." },
{ en: "usher", ko: "~을 시작하게되다, ~을 도입하다", etym: "안내원(usher)이 자리를 안내하듯 새로운 시대로 인도한다는 비유입니다.", ex: "The new invention will usher in a new era of communication." },
{ en: "squirrel money away", ko: "돈을 조금씩 모으다, 비축하다", etym: "다람쥐(squirrel)가 겨울을 위해 도토리를 숨겨두듯 돈을 저축하는 모습입니다.", ex: "She managed to squirrel away some money for her vacation." },
{ en: "pie-in-the-sky", ko: "그림의 떡, 실현가능성 없는 막연한 희망", etym: "하늘(sky)에 떠 있는 파이처럼 먹고 싶지만 가질 수 없는 공상입니다.", ex: "His plans for the new company are just pie-in-the-sky." },
{ en: "prognostication", ko: "(전문적) 예측", etym: "미리(pro-) 알다(gnosis)라는 뜻으로, 징후를 보고 앞날을 내다보는 것입니다.", ex: "The economist's prognostications about the market were correct." },
{ en: "notwithstanding", ko: "~에도 불구하고, ~은 제쳐두고", etym: "어떤 장애물이 있어도 견디며(withstand) 반대하지 않음(not)을 뜻합니다.", ex: "Notwithstanding the bad weather, the event was a success." },
{ en: "whatsoever", ko: "전혀, 조금도(아니다)", etym: "whatever의 강조형으로, 부정문 뒤에서 의미를 아주 강하게 만듭니다.", ex: "I have no interest in that subject whatsoever." },
{ en: "better yet", ko: "차라리", etym: "더 좋은(better) 제안이나 대안을 낼 때 쓰는 표현입니다.", ex: "We could go for a walk, or better yet, go for a swim." },

{ en: "when it comes to", ko: "~에 관해서는/~의 경우에는", etym: "화제가 특정 지점에 도달했을(comes to) 때를 지칭하는 관용구입니다.", ex: "When it comes to cooking, he is a real expert." }

/* baseData 배열 - 파트 2 (51번 ~ 100번) */
{ en: "recuperate", ko: "회수하다", etym: "본래 건강을 회복하거나 잃었던 돈/가치를 다시 되찾는(recuperare) 과정입니다.", ex: "They hope to recuperate the losses through the new project." },

{ en: "take it or leave it", ko: "싫으면 말고", etym: "이 조건을 받든지(take) 아니면 떠나든지(leave) 하라며 더 이상의 협상을 거부하는 태도입니다.", ex: "That's my final offer. Take it or leave it." },
{ en: "ring a bell", ko: "낯익다", etym: "머릿속의 종(bell)을 울려 기억을 환기하듯, 들어본 적 있는 것 같을 때 씁니다.", ex: "His name sounds familiar, but it doesn't ring a bell." },
{ en: "lenient", ko: "규정이 유연하다 / 관대하다", etym: "라틴어 lenis(부드러운)에서 유래하여 처벌이나 규칙 적용이 엄격하지 않은 상태입니다.", ex: "The professor is very lenient with deadlines." },
{ en: "sty", ko: "(눈) 다래끼", etym: "눈꺼풀에 생기는 염증성 질환을 부르는 의학적/일상적 용어입니다.", ex: "I think I'm getting a sty in my left eye." },
{ en: "canker sore", ko: "구내염", etym: "입안 점막에 생기는 작고 아픈 궤양을 뜻합니다.", ex: "It's painful to eat because of this canker sore." },
{ en: "cold sore", ko: "입 주변에 난 입병", etym: "주로 피곤할 때 입술 주변에 물집처럼 잡히는 헤르페스 증상을 말합니다.", ex: "I always get a cold sore when I'm stressed." },
{ en: "arbitrary", ko: "임의의, 독단적인", etym: "객관적인 기준 없이 중재자(arbiter)의 개인적인 기분에 따라 결정된 상태입니다.", ex: "The decision seemed completely arbitrary." },
{ en: "as such", ko: "보통 말하는 그런", etym: "앞서 언급된 명사의 성질을 그대로 지닌 '그 자체로서'라는 의미의 연결어입니다.", ex: "He is a great leader and should be treated as such." },
{ en: "orient", ko: "지향하게 하다, 목적에 맞추게 하다", etym: "해가 뜨는 동쪽(Orient)을 찾아 방향을 잡듯 기준에 맞춰 조정하는 것입니다.", ex: "New employees need time to orient themselves to the company culture." },
{ en: "inherent", ko: "내재된, 고유의, 타고난", etym: "뼈나 조직 안에(in-) 붙어(here) 있는 것처럼 분리할 수 없는 본질적인 특성입니다.", ex: "There are inherent risks in any business venture." },
{ en: "stand for", ko: "의미하다 / 옹호하다 / 용납하다", etym: "어떤 가치를 위해 그 자리에 서 있다(stand)는 뜻에서 유래한 다의어입니다.", ex: "NASA stands for National Aeronautics and Space Administration." },
{ en: "underpin", ko: "기초가 되다, 지지하다", etym: "건축물 아래에 핀(pin)이나 기둥을 박아 튼튼하게 받쳐주는(under) 동작입니다.", ex: "Strong evidence must underpin your argument." },
{ en: "by product", ko: "부산물, 부작용", etym: "주된 생산물 옆(by)에서 의도치 않게 함께 만들어진 결과물입니다.", ex: "Pollution is a byproduct of industrial growth." },
{ en: "fallacy", ko: "오류, 착오, 허위", etym: "속이다(fallere)라는 뜻에서 유래하여, 겉보기엔 그럴듯하지만 틀린 논리입니다.", ex: "The idea that money brings happiness is a common fallacy." },
{ en: "equation", ko: "방정식", etym: "양쪽을 같게(equal) 만드는 수식, 혹은 복잡한 상황을 구성하는 여러 요소들의 관계입니다.", ex: "In the business equation, customer satisfaction is the most important factor." },
{ en: "subtlety", ko: "미묘함, 절묘함", etym: "베 밑(sub-)으로 실을 촘촘히 짠 것처럼 아주 세밀하고 섬세해서 알아채기 어려운 매력입니다.", ex: "I appreciate the subtlety of her acting." },
{ en: "denial", ko: "부정, 부인, 거부", etym: "사실이 아니라고 말(ny)하거나 인정하지 않는 태도입니다.", ex: "He is in denial about his health problems." },
{ en: "underscore", ko: "강조하다, 부각하다", etym: "중요한 글자 아래에 밑줄(underscore)을 그어 눈에 띄게 만드는 행위입니다.", ex: "The recent accident underscores the need for better safety rules." },
{ en: "owe to", ko: "~덕분이다, 기인하다", etym: "자신의 성취나 상태를 특정 원인에게 빚(owe)지고 있다는 논리적 연결입니다.", ex: "I owe my success to my parents' support." },
{ en: "disburse", ko: "(특정 목적을 위해 모은 돈에서) 지출하다", etym: "지갑(burse)에서 돈을 밖으로(dis-) 꺼내어 지불한다는 격식 있는 표현입니다.", ex: "The scholarship funds will be disbursed next week." },
{ en: "subtract", ko: "(수 양을) 빼다", etym: "아래로(sub-) 끌어당겨(tract) 전체 양을 줄이는 뺄셈 동작입니다.", ex: "If you subtract 5 from 10, you get 5." },
{ en: "void", ko: "빈, 공허한", etym: "아무것도 없이 텅 빈 공간, 혹은 법적 효력이 없는 상태를 뜻합니다.", ex: "The contract was declared null and void." },
{ en: "straight out of", ko: "~에서 나온 것 같은", etym: "영화나 책 속에서 곧장(straight) 튀어나온 것처럼 현실감이 없거나 전형적일 때 씁니다.", ex: "This landscape is straight out of a fairy tale." },
{ en: "unshackle", ko: "쇠고랑을 풀어주다, 자유를 주다", etym: "구속하던 수갑이나 족쇄(shackle)를 제거하여(un-) 해방시키는 비유입니다.", ex: "The new law will unshackle the creative industry." },
{ en: "materialism", ko: "물질주의", etym: "정신적인 가치보다 눈에 보이는 물질(material)과 소유를 중시하는 신념입니다.", ex: "Modern society is often criticized for its materialism." },
{ en: "obsessed", ko: "사로잡힌, 집착하는", etym: "누군가의 앞에(ob-) 앉아(sess) 떠나지 않듯, 한 생각에 완전히 지배당한 상태입니다.", ex: "He is obsessed with video games." },
{ en: "obsolete", ko: "시대에 뒤진, 구식의", etym: "더 이상 쓰이지 않고 익숙함에서 벗어나(ob-) 사라져가는 상태입니다.", ex: "Typewriters have become obsolete since computers were invented." },
{ en: "distract", ko: "주의를 빼앗다, 초점을 흐리다", etym: "끌어당기는 힘(tract)을 분산시켜(dis-) 집중력을 흩트리는 행위입니다.", ex: "Don't let the noise distract you from your work." },
{ en: "declutter", ko: "물건이나 생각을 정리하다", etym: "지저분하게 널브러진 것들(clutter)을 제거하여(de-) 깨끗하게 치우는 것입니다.", ex: "I spent the weekend decluttering my room." },
{ en: "integral to", ko: "필수적인, 본질적인", etym: "전체(integer)를 구성하는 데 없어서는 안 될 핵심 부품 같은 상태입니다.", ex: "Technology is integral to our daily lives." },
{ en: "principal", ko: "주요한, 주된 / 교장", etym: "가장 첫 번째(prim-)의 위치를 차지하는 중요한 요소나 사람을 뜻합니다.", ex: "The principal reason for the meeting was to discuss the budget." },
{ en: "poorly", ko: "형편없이, 부실하게 / 나쁘게 / 서툴게", etym: "가난하게(poor)라는 뜻 외에도 질적으로 매우 낮은 수준을 나타냅니다.", ex: "The event was poorly organized." },
{ en: "go on a fast", ko: "단식을 하다", etym: "음식을 먹지 않고 빠르게(fast) 시간을 보낸다는 고어적 의미에서 유래한 금식 행위입니다.", ex: "He decided to go on a fast for religious reasons." },
{ en: "vice versa", ko: "그 반대의 경우도 마찬가지이다", etym: "순서를 바꾸어도(vice) 돌려 말한(versa) 것과 같다는 라틴어구입니다.", ex: "I trust him, and vice versa." },
{ en: "antithesis", ko: "반대(되는 것), 대립", etym: "어떤 명제에 반대(anti-)하여 놓인(thesis) 정반대의 주장을 뜻합니다.", ex: "Slavery is the antithesis of freedom." },
{ en: "synonym", ko: "동의어, 유의어", etym: "이름(onym)을 함께(syn-) 공유할 수 있을 정도로 뜻이 같은 단어입니다.", ex: "'Big' and 'large' are synonyms." },
{ en: "Recipient", ko: "수상자, 이식자, 수신자", etym: "다시(re-) 받아들이는(cip) 사람, 즉 무언가를 전달받는 모든 대상을 뜻합니다.", ex: "She was the recipient of a prestigious award." },
{ en: "posit", ko: "사실로 받아들이다, 상정하다", etym: "논의를 위해 어떤 가설을 제자리에 놓아(pos-) 두는 행위입니다.", ex: "Economists posit that higher taxes will lead to lower spending." },
{ en: "Go through", ko: "겪다, 경험하다, 살펴보다 (과정에 초점)", etym: "어떤 터널을 통과해(through) 가듯(go) 힘든 일이나 절차를 하나하나 거치는 모습입니다.", ex: "She is going through a difficult time right now." },
{ en: "Get through", ko: "극복하다, 통과하다, 끝내다 (결과에 초점)", etym: "어려움을 뚫고 목적지에 도달(get)하여 마침내 해냈다는 성취를 강조합니다.", ex: "I need to get through this meeting first." },
{ en: "antibiotics", ko: "항생제", etym: "생명체(bio)에 대항(anti-)하여 박테리아를 죽이는 약물입니다.", ex: "The doctor prescribed antibiotics for my infection." },
{ en: "prescribe", ko: "처방하다", etym: "미리(pre-) 글을 써서(scribe) 약사에게 전달하거나 지시하는 행동입니다.", ex: "He prescribed a special diet for the patient." },
{ en: "coughing and sneezing", ko: "기침과 재채기", etym: "감기나 알레르기 증상으로 나타나는 반사적인 신체 반응들입니다.", ex: "The room was filled with the sound of coughing and sneezing." },
{ en: "advocate", ko: "지지하다, 옹호자", etym: "누군가를 위해(ad-) 목소리(voc)를 내어 돕는 지지 활동을 뜻합니다.", ex: "They advocate for better healthcare for the elderly." },
{ en: "assertive", ko: "자기주장이 강한", etym: "자신의 권리나 의견을 확실하게 결합(sert)하여 밖으로 드러내는 태도입니다.", ex: "You need to be more assertive to get what you want." },
{ en: "consult", ko: "정보를 얻기 위해 뭔가를 찾아보다", etym: "전문가와 상담하거나 책 등을 함께(con-) 살펴서 답을 구하는 것입니다.", ex: "You should consult a lawyer before signing the contract." },
{ en: "prioritize", ko: "우선순위를 매기다", etym: "더 앞선(prior) 중요한 일들을 먼저 처리하도록 순서를 정하는 것입니다.", ex: "It's important to prioritize your tasks every morning." },
{ en: "delegate", ko: "업무/권한을 위임하다, 대표를 선정하다", etym: "아래 사람에게 법적 의무를 부여하여(legare) 멀리 보내(de-) 대신 일하게 하는 것입니다.", ex: "A good manager knows how to delegate tasks." },
{ en: "address", ko: "다루다, 해결하다, 연설하다", etym: "어떤 대상을 똑바로 향하게(direct) 하여 문제를 정면으로 돌파하거나 말을 건네는 것입니다.", ex: "The company must address the customer's complaints immediately." },
{ en: "on the go", ko: "바쁘게 움직이다, 바쁘다", etym: "계속 이동 중(go)이거나 활동하는 상태여서 쉴 틈이 없음을 뜻합니다.", ex: "I'm always on the go, so I eat lunch in the car." },
{ en: "break out in a rash", ko: "피부 발진이 생기다", etym: "피부 밖으로 발진이 갑자기 터져(break) 나오듯(out) 발생하는 현상입니다.", ex: "He broke out in a rash after eating shrimp." },
{ en: "break out in (a cold sweat, goosebumps, tears)", ko: "(식은땀, 소름, 눈물)이 갑자기 나다", etym: "내부의 감정이나 반응이 갑작스럽게 밖으로 쏟아지는 표현 모음입니다.", ex: "She broke out in a cold sweat when she heard the news." },
{ en: "she is on the ball", ko: "그녀는 일처리가 능숙하고 빠르다", etym: "야구 선수가 공(ball) 위에서 집중력을 잃지 않듯, 빠릿빠릿하게 대처하는 모습입니다.", ex: "Our new assistant is really on the ball." },
{ en: "I’ll circle back", ko: "확인해보고 다시 연락드릴게요", etym: "원이 돌아오듯(circle back) 다시 제자리로 와서 대화를 이어가겠다는 비즈니스 표현입니다.", ex: "I don't have the answer now, but I'll circle back to you tomorrow." },
{ en: "pretty much", ko: "그런 셈이지 / 거의 그래", etym: "완벽히 똑같지는 않아도 아주 많이(much) 비슷하여 사실상 같음을 뜻합니다.", ex: "We've pretty much finished the project." },
{ en: "as far as I know", ko: "내가 알기로는", etym: "내 지식이 미치는 범위(far) 안에서는 그렇다며 조심스럽게 정보를 줄 때 씁니다.", ex: "As far as I know, the meeting is still on." },
{ en: "put a fork in it", ko: "그만두다, 포기하다 / 다 끝났다", etym: "고기가 다 익었는지 포크(fork)를 찔러 확인하듯, 이제 끝났으니 종료하자는 뜻입니다.", ex: "This project is a disaster. Put a fork in it; we're done." },
{ en: "when will that be", ko: "그게 언제 되는데?", etym: "미래의 특정 시점이 언제일지 구체적으로 묻는 직접적인 질문입니다.", ex: "You said you'd fix it soon. When will that be?" },
{ en: "cut to the chase", ko: "본론으로 들어가다", etym: "영화의 지루한 대화 대신 핵심인 추격전(chase)으로 바로 넘어가자는 뜻입니다.", ex: "We don't have much time, so let's cut to the chase." },
{ en: "call it a day", ko: "오늘은 그만 끝내다", etym: "이 정도면 하루(day) 업무를 했다고 부를(call) 수 있겠다며 퇴근을 제안할 때 씁니다.", ex: "It's already 7 PM. Let's call it a day." },
{ en: "out of sorts", ko: "기분이 언짢다 / 몸이 안 좋다", etym: "종류별로 분류(sorts)된 상태에서 벗어난 것처럼 컨디션이 평소 같지 않을 때 씁니다.", ex: "I'm feeling a bit out of sorts today." },
{ en: "chicken out", ko: "겁을 먹고 그만두다", etym: "겁쟁이인 닭(chicken)처럼 굴며 밖으로(out) 도망치듯 포기하는 모습입니다.", ex: "He was going to jump, but he chickened out at the last minute." },
{ en: "kudos", ko: "잘했어, 대단해 (축하)", etym: "그리스어 kydos(영광)에서 유래하여 공로를 인정하고 칭찬할 때 씁니다.", ex: "Kudos to the team for winning the championship!" },
{ en: "abduct", ko: "유괴하다, 납치하다", etym: "중심에서 멀리(ab-) 끌고(duct) 가버리는 범죄 행위입니다.", ex: "The child was allegedly abducted by a stranger." },
{ en: "splash", ko: "철벅(후두둑) 떨어지다", etym: "액체가 물체에 부딪히며 사방으로 튀는 소리나 그 동작입니다.", ex: "The rain splashed against the window." },
{ en: "thump", ko: "주먹으로 세게 치다 / 쿵 하는 소리", etym: "무겁고 둔탁한 물체가 부딪힐 때 나는 소리나 그 타격입니다.", ex: "I heard a loud thump coming from the upstairs." },
{ en: "denture", ko: "틀니", etym: "이빨(dent-)을 인공적으로 만들어 끼우는 장치입니다.", ex: "My grandfather takes out his dentures every night." },
{ en: "cavity", ko: "충치 / 구멍", etym: "이빨에 생긴 빈(cav-) 공간, 즉 썩어서 파인 구멍을 뜻합니다.", ex: "The dentist found a small cavity in my molar." },
{ en: "tooth decay", ko: "충치 (현상)", etym: "이빨이 썩어가는(decay) 과정이나 그로 인한 질환 전체를 말합니다.", ex: "Too much sugar is the main cause of tooth decay." },
{ en: "lateral incisor", ko: "송곳니 쪽 앞니", etym: "중앙 앞니 옆(lateral)에 위치한 자르는(incise) 이빨입니다.", ex: "She has a small gap next to her lateral incisor." },
{ en: "overbite", ko: "윗니 부정교합", etym: "윗니가 아랫니를 지나치게 덮어서(over) 맞물리는 상태입니다.", ex: "He had braces to correct his overbite." },
{ en: "underbite", ko: "아랫니 부정교합", etym: "아랫니가 윗니보다 더 밖으로(under) 튀어나온 상태입니다.", ex: "An underbite can sometimes cause jaw pain." },
{ en: "classy", ko: "세련된, 품격 있는", etym: "높은 계급(class)에 어울릴 만큼 우아하고 고급스러운 멋을 뜻합니다.", ex: "She always wears such classy clothes." },
{ en: "posh", ko: "우아한, 화려한", etym: "영국 상류층의 화려하고 고급스러운 라이프스타일을 묘사하는 단어입니다.", ex: "We stayed at a very posh hotel in London." },
{ en: "gigantic", ko: "거대한", etym: "거인(giant)처럼 엄청나게 큰 규모를 뜻합니다.", ex: "The cruise ship was absolutely gigantic." },
{ en: "sublime", ko: "숭고한, 장엄한 / 절묘한", etym: "문턱 아래(sub-)에서 가장 높은 곳(limen)까지 닿을 만큼 압도적인 아름다움입니다.", ex: "The view from the mountain top was sublime." },
{ en: "exquisite", ko: "정교한", etym: "밖으로(ex-) 찾아내어(quisit) 정성스럽게 고른 것처럼 아주 섬세하고 아름다운 상태입니다.", ex: "The jewelry was made with exquisite detail." },
{ en: "ravishing", ko: "기가 막히게 아름다운, 매혹적인", etym: "정신을 뺏어갈(ravish) 정도로 눈부시게 예쁜 상태를 묘사합니다.", ex: "You look ravishing in that red dress." },
{ en: "dazzling", ko: "눈부신", etym: "빛이 너무 강해 눈을 제대로 뜰 수 없을 만큼 화려하고 인상적인 모습입니다.", ex: "The actress gave a dazzling performance." },
{ en: "snazzy", ko: "세련된, 맵시 있는", etym: "현대적이고 스타일리시해서 눈길을 확 사로잡는 멋을 뜻합니다.", ex: "That's a snazzy tie you're wearing." },
{ en: "substantial", ko: "상당한", etym: "실체(substance)가 있고 묵직해서 무시할 수 없을 만큼 양이 많은 상태입니다.", ex: "A substantial amount of money was donated to the charity." },
{ en: "sizable", ko: "상당한, 큰", etym: "크기(size)가 꽤 커서 존재감이 확실한 상태를 뜻합니다.", ex: "They bought a sizable house in the suburbs." },
{ en: "rather", ko: "꽤, 약간, 상당히", etym: "생각보다 혹은 기대보다 어느 정도 수치가 있음을 나타내는 부사입니다.", ex: "The exam was rather difficult." },
{ en: "colossal", ko: "거대한", etym: "거대 동상(colossus)처럼 규모가 엄청나게 크고 웅장한 상태입니다.", ex: "The project was a colossal failure." },
{ en: "tremendous", ko: "엄청난, 굉장한", etym: "너무 거대해서 땅을 울리게(trem-) 할 정도로 대단한 양이나 기세입니다.", ex: "He has a tremendous amount of energy." },
{ en: "luxurious and spacious", ko: "호화롭고 넓은", etym: "사치스러울(luxury) 만큼 고급스럽고 공간이 넉넉한(space) 상태를 결합한 표현입니다.", ex: "The suite was luxurious and spacious." },
{ en: "itch", ko: "몸이 가렵다 / ~하고 싶어 근질거리다", etym: "피부가 가려운 감각이나 무언가를 하고 싶은 강한 욕구를 비유합니다.", ex: "I have an itch on my back that I can't reach." },
{ en: "earlobes", ko: "귓볼", etym: "귀의 아래쪽에 붙어 있는 부드럽고 둥근 살 부분입니다.", ex: "She got her earlobes pierced when she was ten." },
{ en: "naughty", ko: "장난기 많은, 버릇없는", etym: "아무것도 아닌(naught) 행동을 하며 어른의 말을 안 듣는 아이를 묘사합니다.", ex: "Stop being so naughty and sit down." },
{ en: "nostril", ko: "콧구멍", etym: "코에서 공기가 드나드는 두 개의 구멍 중 하나입니다.", ex: "His nostrils flared when he was angry." },
{ en: "eyelid", ko: "눈꺼풀", etym: "눈을 덮어 보호하는 뚜껑(lid) 같은 피부 조직입니다.", ex: "I have a small bump on my upper eyelid." },
{ en: "buttocks", ko: "엉덩이", etym: "사람의 엉덩이 부분을 이루는 두 개의 근육 덩어리를 뜻하는 명칭입니다.", ex: "He fell and landed right on his buttocks." },
{ en: "testicles (=balls)", ko: "고환", etym: "남성의 생식 기관 중 하나로, 일상적으로는 balls라고도 부릅니다.", ex: "The doctor checked for any lumps in the testicles." },
{ en: "groin", ko: "사투구니", etym: "다리와 몸통이 만나는 V자 형태의 부위입니다.", ex: "He pulled a muscle in his groin during the game." },
{ en: "armpit", ko: "겨드랑이", etym: "팔(arm) 아래의 움푹 파인(pit) 부분을 뜻합니다.", ex: "Deodorant is used to control odor in the armpit." },
{ en: "coward", ko: "겁쟁이", etym: "꼬리(cauda)를 다리 사이에 말아넣고 도망치는 짐승처럼 겁이 많은 사람입니다.", ex: "Don't be a coward; stand up for yourself." },
{ en: "come apart at the seam", ko: "완전히 망하다 / 파산하다 / 감정적으로 무너지다", etym: "옷의 솔기(seam)가 터져서 옷이 분해되듯(apart), 상황이나 멘탈이 무너지는 비유입니다.", ex: "After the scandal, the company began to come apart at the seams." },
{ en: "swamp", ko: "늪", etym: "물이 고여 있고 진흙이 많은 습지대, 혹은 일이 너무 많아 압도당하는 상황입니다.", ex: "I'm swamped with work this week." },
{ en: "grove", ko: "작은 숲, 밭, 과수원", etym: "일정한 종류의 나무가 모여 있는 작은 규모의 숲이나 경작지입니다.", ex: "We walked through a grove of olive trees." },
{ en: "bogs", ko: "늪지", etym: "이끼가 많고 땅이 축축하고 물렁한 습지를 뜻합니다.", ex: "Be careful not to get stuck in the bogs." },
{ en: "pier", ko: "부두", etym: "배를 대거나 산책을 위해 육지에서 바다로 길게 뻗어 나온 구조물입니다.", ex: "Let's go fishing off the pier." },
{ en: "avalanche", ko: "눈사태, 산사태", etym: "산비탈을 타고 눈이나 흙이 거대한 기세로 쏟아져 내려오는 현상입니다.", ex: "The mountain pass was closed due to an avalanche." },
{ en: "piggyback ride", ko: "어부바", etym: "사람을 등에 업고 태워주는 놀이나 동작입니다.", ex: "Give me a piggyback ride, Daddy!" },
{ en: "upsy-daisy", ko: "이런, 아이고, 어이쿠", etym: "아이를 들어 올리거나 아이가 넘어졌을 때 달래며 하는 정겨운 감탄사입니다.", ex: "Upsy-daisy! Up you go." },
{ en: "beddy-bye", ko: "코하다, 코하는 시간 (유아어)", etym: "침대(bed)에 갈 시간임을 아이들에게 귀엽게 말하는 표현입니다.", ex: "It's time for beddy-bye, little one." },
{ en: "meanie", ko: "심술쟁이", etym: "심술궂은(mean) 사람을 아이들이 부르는 것 같은 귀여운 명칭입니다.", ex: "Don't be such a meanie; share your toys." },
{ en: "wee-wee", ko: "쉬하다(동) / 오줌(명)", etym: "소변을 뜻하는 유아용 단어입니다.", ex: "Do you need to go wee-wee?" },
{ en: "porta-potty", ko: "간이 이동식 화장실", etym: "휴대용(portable) 화장실(potty)을 합친 말로 야외 행사장 등에 있는 그것입니다.", ex: "There was a long line for the porta-potty." },
{ en: "tattle", ko: "고자질하다", etym: "남의 잘못을 어른이나 상사에게 일러바치는 행동입니다.", ex: "Don't tattle on your brother; solve it yourselves." },
{ en: "gibberish", ko: "의미 없는 말", etym: "도무지 알아들을 수 없는 횡설수설이나 헛소리입니다.", ex: "He was so drunk he was just talking gibberish." },
{ en: "mediocre", ko: "평범하다 / 썩 좋지 않다", etym: "중간(medi-) 정도의 산(ocris) 높이밖에 안 될 정도로 뛰어나지 않고 그저 그런 상태입니다.", ex: "The food was mediocre, but the service was great." },
{ en: "poppycock", ko: "헛소리, 허튼소리", etym: "강한 부정의 의미를 담아 '말도 안 되는 소리'라고 일축할 때 쓰는 옛스러운 말입니다.", ex: "That story is absolute poppycock!" },
{ en: "hullabaloo", ko: "소란, 소동 (할라발루)", etym: "시끄럽고 소란스러운 난리 법석을 익살스럽게 부르는 말입니다.", ex: "What's all this hullabaloo about?" },
{ en: "malarkey", ko: "허튼수작, 헛소리", etym: "진실성 없는 뻔한 거짓말이나 수작을 비웃을 때 쓰는 표현입니다.", ex: "I don't believe a word of that malarkey." },
{ en: "wishy-washy", ko: "미온적인, 우유부단한", etym: "물로 씻어내어(wash) 농도가 흐릿한 것처럼 태도가 불분명한 상태입니다.", ex: "He's too wishy-washy to be a good leader." },
{ en: "rig", ko: "조작하다", etym: "공정한 경기나 투표를 자신에게 유리하게 미리 손을 써두는 부정행위입니다.", ex: "The election was allegedly rigged." },
{ en: "Dig", ko: "엄청 좋아하다", etym: "땅을 파듯(dig) 무언가에 깊게 파고들어 열광적으로 좋아한다는 뜻의 옛 속어입니다.", ex: "I really dig your new hairstyle." },
{ en: "botch up", ko: "망치다", etym: "서투른 솜씨로 일을 처리해서 엉망으로 만들어버리는 것입니다.", ex: "I completely botched up my driving test." },
{ en: "butter up", ko: "아부하다", etym: "빵에 버터를 바르듯(butter) 상대의 기분을 좋게 하려고 감언이설을 늘어놓는 비유입니다.", ex: "He's trying to butter up the boss to get a promotion." },
{ en: "butt in", ko: "참견하다, 끼어들다", etym: "머리로 들이받듯(butt) 남의 대화나 일에 무례하게 개입하는 행동입니다.", ex: "Sorry to butt in, but I have a question." },
{ en: "don’t butt in line", ko: "새치기하지 마세요", etym: "줄(line) 사이로 머리를 들이밀고(butt) 들어오지 말라는 경고입니다.", ex: "Hey, don't butt in line; wait your turn." },
{ en: "chew the fat", ko: "수다 떨다", etym: "질긴 비계(fat)를 오래 씹듯(chew) 한가하게 앉아 긴 시간 대화를 나누는 모습입니다.", ex: "We spent the afternoon chewing the fat over coffee." },
{ en: "ignorance is bliss", ko: "모르는 게 약이다", etym: "모르는 상태(ignorance)가 오히려 행복(bliss)을 가져다준다는 격언입니다.", ex: "I didn't know the house was haunted. Ignorance is bliss." },
{ en: "that’s a matter of perspective", ko: "생각하기 나름이다 / 관점의 문제다", etym: "보는 각도(perspective)에 따라 해석이 달라질 수 있음을 뜻합니다.", ex: "Is the glass half full or half empty? That's a matter of perspective." },
{ en: "The squeaky wheel gets the grease", ko: "삐걱거리는 바퀴가 기름을 얻는다 (우는 아이 떡 하나 더 준다)", etym: "소리를 내며(squeaky) 불평하는 바퀴에 먼저 기름(grease)을 쳐주듯, 요구하는 사람이 혜택을 받는다는 비유입니다.", ex: "If you want a raise, ask for it. The squeaky wheel gets the grease." },
{ en: "cat’s out of the bag", ko: "사실이 밝혀지다 / 비밀을 누설하다", etym: "가방 속에 숨겨둔 고양이(cat)가 밖으로 튀어나오듯 감췄던 비밀이 드러난 상황입니다.", ex: "I was trying to keep the party a secret, but the cat's out of the bag." },
{ en: "let bygones be bygones", ko: "과거는 과거에 묻어둬", etym: "지나간 일들(bygones)은 그냥 지나간 상태로 두자며 화해를 제안할 때 씁니다.", ex: "Let's stop fighting and let bygones be bygones." },
{ en: "there is no such thing as a free lunch", ko: "세상에 공짜란 없어", etym: "무료 점심(free lunch)처럼 보여도 결국은 대가를 치르게 된다는 경제적/삶의 지혜입니다.", ex: "The offer sounds too good to be true. Remember, there's no such thing as a free lunch." },
{ en: "Beggars can’t be choosers", ko: "찬밥 더운밥 가릴 처지가 아니다", etym: "얻어먹는 사람(beggar)은 주는 대로 받아야지 선택권(chooser)이 없다는 일침입니다.", ex: "The hotel isn't great, but it's the only one available. Beggars can't be choosers." },
{ en: "I’ve lost my marbles because of you", ko: "너 때문에 미쳤어", etym: "머릿속에 든 구슬(marbles), 즉 지능이나 이성을 잃어버렸다는 유머러스한 비유입니다.", ex: "Trying to fix this computer is making me lose my marbles." },
{ en: "you’re bananas", ko: "넌 미쳤어", etym: "바나나(bananas)처럼 구부러지거나 뒤틀린 정신 상태를 뜻하는 귀여운 속어입니다.", ex: "You want to jump off a bridge? You're bananas!" },
{ en: "get a kick out of~", ko: "~에 재미/흥미를 느끼다", etym: "발로 차는 것(kick) 같은 강한 자극이나 즐거움을 특정 대상에게서 얻는다는 뜻입니다.", ex: "She gets a kick out of watching horror movies." },
{ en: "goody two shoes", ko: "범생이 / 착한 척하는 애", etym: "동화 속에서 구두 두 켤레를 받고 너무 기뻐하던 착한 아이 캐릭터에서 유래한 약간 비꼬는 표현입니다.", ex: "She's such a goody two shoes; she never breaks any rules." },
{ en: "worrywart", ko: "잔걱정을 많이 하는 사람", etym: "몸에 난 사마귀(wart)처럼 걱정(worry)을 늘 달고 사는 사람을 뜻합니다.", ex: "Stop being such a worrywart; everything will be fine." },
{ en: "cheapskate", ko: "짠돌이, 구두쇠 (= tightfist, penny-pincher)", etym: "돈 쓰는 것을 극도로 아끼는 인색한 사람을 낮잡아 부르는 말입니다.", ex: "Don't be such a cheapskate; buy your own coffee." },
{ en: "fuddy-duddy", ko: "꼰대, 올드한 사람", etym: "유행에 뒤떨어지고 보수적이어서 고리타분한 사람을 놀리는 말입니다.", ex: "My dad is such a fuddy-duddy; he won't even use a smartphone." },
{ en: "Party pooper", ko: "분위기 깨는 사람", etym: "파티 분위기를 엉망(poop)으로 만드는 사람, 즉 흥을 깨는 사람입니다.", ex: "Don't be a party pooper; stay for one more drink." },
{ en: "Busybody", ko: "오지라퍼", etym: "남의 일에 참견하느라 몸이 바쁜(busy) 사람을 뜻합니다.", ex: "Our neighbor is a real busybody; she knows everything about everyone." },
{ en: "social butterfly", ko: "사교적인 사람, 인싸", etym: "꽃을 옮겨 다니는 나비처럼 모임마다 활발하게 참여하는 외향적인 사람입니다.", ex: "She's a social butterfly and has friends in every city." },
{ en: "jack of all trade", ko: "다방면에 뛰어난 사람, 만능", etym: "모든 기술(all trade)을 조금씩 다 할 줄 아는 사람을 뜻합니다.", ex: "He's a jack of all trades; he can fix cars, paint houses, and cook." },
{ en: "slimeball", ko: "기분 나쁜 인간, 썩을 놈", etym: "미끈거리는 점액질(slime) 공처럼 불쾌하고 믿을 수 없는 사람을 욕할 때 씁니다.", ex: "That salesman is a real slimeball." },
{ en: "go-getter", ko: "야망가, 성취하기 위해 열심히 일하는 사람", etym: "원하는 것을 가지러(get) 직접 나가는(go) 적극적인 사람을 뜻합니다.", ex: "The company is looking for a young go-getter for the sales position." },
{ en: "wet blankets", ko: "따분한 사람, 분위기 깨는 사람", etym: "타오르는 불에 젖은 담요(wet blanket)를 덮어 꺼버리듯, 열기에 찬물을 끼얹는 사람입니다.", ex: "Stop complaining about the music; don't be a wet blanket." },
{ en: "down in the mouth", ko: "우울하다 / 의기소침하다", etym: "입꼬리가 아래로(down) 처진 모습에서 유래한 슬픈 감정의 표현입니다.", ex: "You look a bit down in the mouth today. What's wrong?" },
{ en: "down in the dumps", ko: "우울하다 / 의기소침하다", etym: "쓰레기 하치장(dumps) 같은 기분 속에 빠져 있는 우울한 상태입니다.", ex: "She's been down in the dumps ever since her dog ran away." },
{ en: "cut me to the quick", ko: "큰 상처를 주다", etym: "손톱 아래의 예민한 생살(quick)까지 깊게 베인(cut) 것처럼 큰 정신적 충격을 주는 것입니다.", ex: "His harsh words cut me to the quick." },
{ en: "get all bent out of shape", ko: "몹시 화가 나다", etym: "감정적으로 너무 격해져서 몸의 형태가 꼬일(bent) 정도로 화가 난 모습입니다.", ex: "Don't get all bent out of shape just because I'm late." },
{ en: "taken aback", ko: "당황하다", etym: "돛이 갑작스러운 역풍을 맞아 뒤로(aback) 밀려나듯, 예상치 못한 일에 놀란 상태입니다.", ex: "I was taken aback by his sudden outburst." },
{ en: "dump", ko: "버리다 / 차버리다 / 대방출 / 폐기장", etym: "물건을 쏟아버리거나(dump) 연인 관계를 끝내버리는 거친 동작을 뜻합니다.", ex: "He dumped her via a text message." },
{ en: "you’re way too fab to be down in the dumps", ko: "우울해하기에는 당신은 너무 매력적이에요", etym: "매력적(fabulous)인 사람이 우울한 곳(dumps)에 있기엔 아깝다는 응원의 문장입니다.", ex: "Smile! You're way too fab to be down in the dumps." },
{ en: "out of the blue", ko: "갑자기, 난데없이", etym: "맑고 푸른(blue) 하늘에서 갑자기 벼락이 치듯 예고 없이 벌어진 일입니다.", ex: "He called me out of the blue after ten years." },
{ en: "pink slip", ko: "해고 통지서", etym: "과거에 해고 통지서를 분홍색(pink) 종이(slip)에 인쇄해서 주던 관습에서 유래했습니다.", ex: "The company gave pink slips to over 100 workers." },
{ en: "사람 + red-handed", ko: "현행범으로", etym: "죄를 지은 사람의 손에 피(red)가 묻은 채로 잡혔다는 뜻에서 유래했습니다.", ex: "The thief was caught red-handed while stealing the car." },
{ en: "subterfuge", ko: "속임수", etym: "아래로(sub-) 도망치다(fuge)라는 뜻에서, 진실을 피하기 위해 꾸며낸 교묘한 속임수를 뜻합니다.", ex: "He used a lot of subterfuge to hide his real intentions." },
{ en: "paint the town red", ko: "술판을 벌이다", etym: "온 마을을 붉게(red) 칠하듯 밤새도록 아주 흥겹고 떠들썩하게 노는 모습입니다.", ex: "It's my birthday, let's go out and paint the town red!" },
{ en: "red flag", ko: "적신호, 위험 신호", etym: "위험을 경고하기 위해 흔드는 붉은 깃발처럼, 조심해야 할 징조를 뜻합니다.", ex: "His constant lying was a major red flag for her." },
{ en: "red herring", ko: "논점 회피, 미끼", etym: "사냥개들의 코를 속이기 위해 냄새가 강한 훈제 청어(red herring)를 이용하듯, 주의를 돌리는 가짜 정보를 뜻합니다.", ex: "The suspect's alibi turned out to be a red herring." },
{ en: "red tape", ko: "과도한 절차, 지나친 과정", etym: "과거에 공식 문서를 붉은 끈(red tape)으로 묶어 보관하던 관습에서 유래한 관료주의적 폐해입니다.", ex: "There is so much red tape involved in starting a new business." },
{ en: "lay out", ko: "펼치다, 계획하다", etym: "물건을 바닥에 늘어놓듯(lay out) 상세한 계획이나 설계를 보여주는 것입니다.", ex: "The architect laid out the plans for the new house." },
{ en: "dire", ko: "참혹한, 끔찍한", etym: "상황이 매우 심각하고 무서울 정도로 나쁜 상태를 묘사합니다.", ex: "The country is in dire need of food and water." },
{ en: "consequence", ko: "결과", etym: "어떤 행동을 뒤따라(sequi) 함께(con-) 발생하는 필연적인 결과입니다.", ex: "You must accept the consequences of your actions." },
{ en: "reproductive", ko: "번식의", etym: "생명체를 다시(re-) 생산(produce)해내는 생물학적인 과정과 관련된 형용사입니다.", ex: "The study focuses on the reproductive system of frogs." },
{ en: "monumental", ko: "기념비적인", etym: "기념비(monument)로 남을 만큼 역사적으로 매우 중요하거나 거대한 일입니다.", ex: "Building the pyramids was a monumental task." },
{ en: "acclaimed", ko: "칭송받는, 호평의", etym: "많은 사람에 의해 밖으로(ac-) 소리 높여(claim) 칭찬받는 상태입니다.", ex: "He is a critically acclaimed director." },
{ en: "could not come at a more urgent moment", ko: "이보다 시급한 때에 오지 않을 수 없었다", etym: "지금이 바로 그 일이 발생해야만 하는 가장 절박하고 중요한 타이밍이라는 강조입니다.", ex: "The new rescue plan could not come at a more urgent moment." },
{ en: "infidelity", ko: "부정, 바람기", etym: "신뢰(fides)가 없는(in-) 상태, 즉 배우자나 연인에 대한 배신행위입니다.", ex: "Their marriage ended because of his infidelity." },
{ en: "dullard", ko: "멍청이, 굼벵이", etym: "머리가 둔하고(dull) 느린 사람을 낮잡아 부르는 말입니다.", ex: "Don't be such a dullard; use your brain." },
{ en: "quarrel", ko: "다툼, 불만", etym: "사소한 일로 벌어지는 말다툼이나 원망 섞인 다툼을 뜻합니다.", ex: "They had a minor quarrel about who should wash the dishes." },
{ en: "make me an offer", ko: "제안해봐", etym: "내가 고려해볼 수 있도록 가격이나 조건을 먼저 제시해보라는 요청입니다.", ex: "I'm selling my bike. Make me an offer." },
{ en: "reenactment", ko: "재연", etym: "과거의 사건을 다시(re-) 실행(enact)하여 보여주는 연극이나 행사입니다.", ex: "The historical society performed a reenactment of the battle." },
{ en: "the other day", ko: "며칠 전에, 얼마 전에", etym: "정확한 날짜는 기억나지 않지만 그리 멀지 않은 과거의 어느 날을 뜻합니다.", ex: "I saw her at the grocery store the other day." },
{ en: "concede", ko: "인정하다 / 수긍하다 / 허락하다", etym: "함께(con-) 물러나다(cede)라는 뜻에서, 상대의 주장이 맞음을 마지못해 인정하는 것입니다.", ex: "He finally conceded that he was wrong." },
{ en: "clairvoyant", ko: "심령술사", etym: "밝게(clair) 보는(voyant) 사람이라는 뜻으로, 미래를 내다보는 초능력자를 말합니다.", ex: "The clairvoyant predicted that I would travel across the sea." },
{ en: "tedious", ko: "지루한, 싫증 나는", etym: "반복적이고 단조로워 몸을 피곤(taedium)하게 만들 정도로 지겨운 상태입니다.", ex: "The data entry job was very tedious." },
{ en: "he drove so fast that we arrived an hour earlier", ko: "그는 너무 빨리 운전해서 우리는 한 시간 일찍 도착했다", etym: "so ~ that 구문을 활용하여 원인과 결과를 설명하는 예문입니다.", ex: "The movie was so boring that I fell asleep." },
{ en: "I will study all night so that I can pass the exam tomorrow", ko: "나는 내일 시험에 합격하기 위해 밤새 공부할 것이다", etym: "so that ~ 구문을 활용하여 목적을 나타내는 예문입니다.", ex: "I'll save money so that I can buy a new car." },
{ en: "in order not to", ko: "~하지 않기 위해", etym: "특정 행동을 피하기 위한 목적을 정중하고 명확하게 나타내는 구문입니다.", ex: "I woke up early in order not to miss the train." },
{ en: "with such gorgeous contents,", ko: "이런 멋진 컨텐츠를 통해", etym: "제시된 내용물(contents)이 아주 훌륭하다(gorgeous)는 점을 강조하는 전치사구입니다.", ex: "With such gorgeous contents, the magazine is sure to be a hit." },
{ en: "I got dumped", ko: "나 차였어", etym: "쓰레기처럼 버려졌다는(dumped) 뜻으로 연인에게 이별 통보를 받았을 때 씁니다.", ex: "I can't believe I got dumped on Valentine's Day." },
{ en: "all sales are final", ko: "반품 및 교환 불가입니다", etym: "판매가 완전히 종료(final)되었으므로 환불 등이 안 된다는 상점의 공지입니다.", ex: "The store is closing down, so all sales are final." },
{ en: "I’m off to work", ko: "나 일하러 갈게", etym: "특정 장소에서 떨어져(off) 일터로 향한다는 일상적인 작별 인사입니다.", ex: "Bye honey, I'm off to work now." },
{ en: "Hear me out", ko: "내 말 좀 들어봐", etym: "중간에 끊지 말고 내 말을 끝까지(out) 다 들어달라는 간곡한 요청입니다.", ex: "I know it sounds crazy, but hear me out." },
{ en: "Speak of the devil", ko: "양반은 못 되네", etym: "악마(devil) 이야기를 하니 악마가 나타났다는 뜻으로, 누군가에 대해 말할 때 그 사람이 나타나면 씁니다.", ex: "Speak of the devil! We were just talking about you." },
{ en: "I’m on the clock", ko: "나 일하는 중이야", etym: "출근 카드를 찍어 시계(clock) 위에 시간이 기록되고 있다는 뜻으로 근무 중임을 뜻합니다.", ex: "I can't talk long; I'm on the clock." },
{ en: "Now I’ve seen it all", ko: "별꼴 다 보네", etym: "살다 살다 이젠 별걸 다 보겠다며 황당하거나 어이없는 상황에서 씁니다.", ex: "A cat walking a dog? Now I've seen it all!" },
{ en: "mince", ko: "잘게 다지다", etym: "고기나 야채를 아주 작은 조각으로 써는 요리 기법입니다.", ex: "Mince the garlic before adding it to the pan." },
{ en: "Dice", ko: "깍둑썰기", etym: "주사위(dice) 모양으로 정육면체로 써는 방법입니다.", ex: "Dice the potatoes into small cubes." },
{ en: "carve", ko: "큰 고기를 먹기 좋게 손질하다", etym: "통째로 구운 고기 등을 얇게 썰어 나누거나 조각하는 동작입니다.", ex: "Who is going to carve the turkey?" },
{ en: "roast", ko: "오븐 등에 굽다", etym: "건조한 열기로 음식의 겉면을 익히는 조리법입니다.", ex: "I'm going to roast a chicken for dinner." },
{ en: "broil", ko: "불판 숯불에 굽다", etym: "열원(불)이 음식 바로 위나 아래에서 직접 닿게 굽는 방식입니다.", ex: "You can broil the fish for about ten minutes." },
{ en: "whisk", ko: "(달걀 등을) 휘젓다", etym: "거품기(whisk)를 사용하여 액체를 빠르게 섞는 동작입니다.", ex: "Whisk the eggs until they are fluffy." },
{ en: "set the table", ko: "식탁을 차리다", etym: "식사를 위해 수저와 접시 등을 제자리에 놓아(set) 준비하는 행동입니다.", ex: "Can you help me set the table for dinner?" },
{ en: "carbohydrate", ko: "탄수화물", etym: "탄소(carbon)와 수소(hydrogen)가 결합한 영양소로 줄여서 carb라고도 합니다.", ex: "Pasta is high in carbohydrates." },
{ en: "food additives", ko: "식품 첨가물", etym: "맛이나 보존성을 위해 인위적으로 추가(add)된 물질들입니다.", ex: "Many processed foods contain harmful food additives." },
{ en: "saturated fat", ko: "포화 지방", etym: "수소로 가득 채워져(saturated) 상온에서 고체 형태를 띠는 지방입니다.", ex: "You should limit your intake of saturated fats." },
{ en: "sodium", ko: "나트륨", etym: "소금의 주요 성분인 화학 원소 명칭입니다.", ex: "This soup has a very high sodium content." },
{ en: "daily caloric intake", ko: "일일 칼로리 섭취량", etym: "하루 동안 음식으로 몸 안으로 가져오는(intake) 에너지의 총량입니다.", ex: "Your daily caloric intake depends on your activity level." },
{ en: "Gorge", ko: "잔뜩 먹다", etym: "목구멍(gorge)이 꽉 찰 때까지 탐욕스럽게 먹어치우는 모습입니다.", ex: "They gorged themselves on chocolate." },
{ en: "savory", ko: "짭짜름한 (감칠맛 나는)", etym: "달콤한 맛과 대비되는, 식욕을 돋우는 짭짤하고 맛있는 향미입니다.", ex: "I prefer savory snacks over sweet ones." },
{ en: "flavorful", ko: "맛이 풍부하다 (full of flavor)", etym: "맛과 향이 진하고 다양하여 입안 가득 풍미가 느껴지는 상태입니다.", ex: "The sauce was very rich and flavorful." },
{ en: "I don’t suppose you", ko: "혹시, 아닐 거라 생각하지만", etym: "부정적인 가정을 먼저 내세워 상대에게 무언가를 정중하게 물어볼 때 씁니다.", ex: "I don't suppose you have a spare key, do you?" },
{ en: "counter", ko: "조리대 부엌", etym: "부엌에서 음식을 준비하거나 계산대 등으로 쓰이는 평평한 상판입니다.", ex: "Leave the keys on the kitchen counter." },
{ en: "grater", ko: "야채 등을 가는 강판", etym: "음식을 문질러(grate) 잘게 부수는 주방 도구입니다.", ex: "Use the cheese grater for the cheddar." },
{ en: "pitcher", ko: "주전자, 물병", etym: "물을 담아 따를 수 있도록 손잡이와 입구가 있는 큰 병입니다.", ex: "We ordered a pitcher of beer." },
{ en: "sieve", ko: "체", etym: "가루를 거르거나 물기를 빼기 위해 구멍이 뚫린 도구입니다.", ex: "Pass the flour through a sieve." },
{ en: "pepper shaker", ko: "후추통", etym: "흔들어서(shake) 후추가 나오게 만든 용기입니다.", ex: "Pass me the pepper shaker, please." },
{ en: "tableware", ko: "식기류", etym: "식탁(table) 위에서 쓰이는 그릇이나 도구(ware) 전체를 뜻합니다.", ex: "They bought new tableware for the party." },
{ en: "So nice to see brothers getting along", ko: "형제들끼리 잘 지내는 게 보기 좋다", etym: "가족 간의 화목한 관계를 흐뭇하게 표현하는 문장입니다.", ex: "I love your family; so nice to see brothers getting along." },
{ en: "gonna tell him off", ko: "훈계하려고 하다", etym: "상대에게 그가 한 잘못을 똑똑히 말해서(tell) 혼을 내는 모습입니다.", ex: "My mom is going to tell me off for breaking the vase." },
{ en: "I take after Dad's side", ko: "아버지 피를 물려받았다", etym: "외모나 성격이 부모님 중 한쪽을 닮았을 때(take after) 쓰는 표현입니다.", ex: "I take after my dad's side; we are all very tall." },
{ en: "Getting along is exhausting", ko: "잘 지내는 건 피곤하다", etym: "타인과 조화로운 관계를 유지하는 데 많은 에너지가 들어감을 뜻합니다.", ex: "Sometimes I just want to be alone. Getting along is exhausting." },
{ en: "looked up to", ko: "존경하다 존중하다", etym: "상대를 위로 올려다보며(look up to) 본보기로 삼는다는 뜻입니다.", ex: "I've always looked up to my older sister." },
{ en: "Extended family", ko: "먼 친척들", etym: "핵가족을 넘어 확장된(extended) 범위의 친가, 외가 식구들을 뜻합니다.", ex: "We have a big reunion with our extended family every Christmas." },
{ en: "tempt", ko: "유혹하다", etym: "상대의 마음을 흔들어 나쁜 일이나 하고 싶은 일을 하게 부추기는 행위입니다.", ex: "The smell of fresh bread tempted me to buy a loaf." },
{ en: "have an affair", ko: "바람을 피우다", etym: "배우자나 연인 외에 다른 사람과 부적절한 관계(affair)를 맺는 것입니다.", ex: "He found out his wife was having an affair." },
{ en: "tease", ko: "애태우다, 놀리다", etym: "상대를 가볍게 괴롭히거나 장난스럽게 웃음거리로 만드는 행동입니다.", ex: "Don't take him seriously; he's just teasing you." },
{ en: "flirt with", ko: "추파를 던지다", etym: "이성에게 관심을 보이며 가볍게 유혹하는 행동을 하는 것입니다.", ex: "He spent the whole night flirting with the waitress." },
{ en: "make eyes at", ko: "여우짓을 하다 / 눈짓을 보내다", etym: "이성적인 관심을 끌기 위해 특별한 눈빛으로 상대를 바라보는 것입니다.", ex: "She was making eyes at him from across the room." },
{ en: "ogle", ko: "뜨겁게 바라보다", etym: "상대를 노골적이거나 탐욕스러운 눈빛으로 쳐다보는 행위입니다.", ex: "It's rude to ogle people like that." },
{ en: "Ask her out", ko: "그녀에게 데이트 신청해", etym: "밖으로(out) 같이 나가자고 요청(ask)하는 전형적인 데이트 신청 표현입니다.", ex: "If you like her, you should ask her out." },
{ en: "I have a crush on you", ko: "너에게 반했어", etym: "누군가를 짝사랑하거나 강하게 끌릴 때 쓰는 가장 일반적인 표현입니다.", ex: "I've had a crush on you since high school." },
{ en: "I'm falling for you", ko: "너에게 빠지고 있어", etym: "사랑이라는 구덩이에 빠져들듯(falling) 상대에게 매료되는 과정입니다.", ex: "The more I know you, the more I'm falling for you." },
{ en: "Split up with somebody", ko: "누군가와 헤어지다", etym: "하나였던 관계가 두 개로 쪼개져(split up) 갈라서는 이별을 뜻합니다.", ex: "She split up with her boyfriend last week." },
{ en: "Drift apart", ko: "사이가 멀어지다", etym: "물 위에 뜬 배가 서서히 떠내려가듯(drift) 특별한 계기 없이 관계가 소원해지는 모습입니다.", ex: "We used to be best friends, but we've drifted apart over the years." },
{ en: "come across", ko: "우연히 마주치다 / 이해가 되다", etym: "길을 가다 마주치거나, 말하고자 하는 바가 상대에게 전달되어 건너가는(across) 것입니다.", ex: "I came across an old photo while cleaning." },
{ en: "that’s not coming across", ko: "그건 잘 이해가 안 되네", etym: "메시지가 나에게까지 건너오지(across) 않아 무슨 말인지 모르겠다는 뜻입니다.", ex: "I'm trying to explain, but it seems like it's not coming across." },
{ en: "I don’t want to come across as a bully", ko: "양아치처럼 보이고 싶지 않아", etym: "타인에게 비치는 나의 인상이 특정 이미지로 전달되는(come across) 것을 피하고 싶을 때 씁니다.", ex: "I'm just being honest; I don't want to come across as a bully." },
{ en: "I’m reaching out to you because -", ko: "이런 이유로 연락을 드립니다", etym: "먼저 손을 뻗어(reach out) 소통을 시작한다는 정중한 비즈니스/일상 메일 서두입니다.", ex: "I'm reaching out to you because I saw your job posting." },
{ en: "what are you craving?", ko: "뭐 먹고 싶어?", etym: "지금 당장 갈망하는(craving) 특정 음식이 무엇인지 묻는 질문입니다.", ex: "I'm so hungry. What are you craving?" },
{ en: "I’m in the mood for a cheese burger", ko: "치즈버거가 당기네", etym: "내 기분(mood)이 특정 음식을 먹기에 딱 적당하다는 뜻입니다.", ex: "Let's go to that burger joint; I'm in the mood for a cheese burger." },
{ en: "Let’s grab a bite", ko: "뭐 좀 먹자", etym: "간단하게 한 입(bite) 베어 물러 가자는 뜻으로 가벼운 식사 제안입니다.", ex: "I'm starving. Let's grab a bite after work." },
{ en: "that’s the way it goes", ko: "그게 인생이야 / 세상이 다 그렇지", etym: "일이 그렇게 흘러가는(goes) 법이라며 어쩔 수 없는 상황을 받아들일 때 씁니다.", ex: "I didn't get the job, but that's the way it goes." },
{ en: "Did I catch you at a bad time?", ko: "지금 통화 괜찮으세요?", etym: "상대를 안 좋은 타이밍(bad time)에 붙잡은(catch) 것은 아닌지 묻는 정중한 확인입니다.", ex: "Hi, it's me. Did I catch you at a bad time?" },
{ en: "It’s a thing these days", ko: "요즘 이거 유행이야", etym: "특정 행동이나 물건이 하나의 사회적 현상(thing)이 되었다는 뜻입니다.", ex: "Taking photos of your food is a thing these days." },
{ en: "whatever it takes", ko: "무슨 일이 있어도 (해낼 거야)", etym: "어떤 대가나 자원(whatever)이 소모(takes)되더라도 상관없다는 강한 의지입니다.", ex: "I will finish this project on time, whatever it takes." },
{ en: "You’re going to blurt out something stupid?", ko: "말도 안 되는 걸 발설할 건가요?", etym: "생각 없이 불쑥(blurt) 어리석은 말을 내뱉을까 봐 걱정하거나 비꼬는 질문입니다.", ex: "Please be quiet; you're going to blurt out something stupid." },
{ en: "Just for the record", ko: "분명히 말하는데 (강조)", etym: "공식적인 기록(record)으로 남길 만큼 확실히 짚고 넘어가겠다는 강조입니다.", ex: "Just for the record, I never agreed to this plan." },
{ en: "I have a bone to pick with you", ko: "너한테 따질 게 있어", etym: "개가 뼈(bone)를 물고 늘어지듯, 해결해야 할 불만이나 논쟁거리가 있다는 비유입니다.", ex: "Hey, stay here. I have a bone to pick with you." },
{ en: "I don't want to keep harping on this", ko: "이것에 대해 계속 거론하고 싶지 않아요", etym: "하프(harp)를 계속 연주하듯 같은 말을 반복해서 잔소리하고 싶지 않다는 뜻입니다.", ex: "I know you made a mistake, and I don't want to keep harping on this." },
{ en: "Bullies're picking on me", ko: "양아치들은 내게 시비를 겁니다", etym: "괴롭히는 사람(bully)들이 특정 대상을 골라(pick) 괴롭힌다는 뜻입니다.", ex: "I hate school because the bullies are picking on me." },
{ en: "I'm tired of you always talking down to me", ko: "거만하게 얘기하는 거에 지겹다", etym: "상대를 아래로(down) 내려다보며 무시하는 말투로 말하는 것에 대한 불만입니다.", ex: "We are equals, so stop talking down to me." },
{ en: "It is really starting to tick me off", ko: "이거 정말 짜증 나게 하네", etym: "시계의 째깍거림(tick)처럼 신경을 계속 긁어 화나게 만들기 시작했다는 뜻입니다.", ex: "His constant whistling is starting to tick me off." },
{ en: "I'm freaking out!", ko: "나 화났어! / 나 멘붕이야!", etym: "통제력을 잃을 정도로 화가 나거나 당황한 상태를 나타내는 강조 표현입니다.", ex: "I lost my passport! I'm freaking out!" },
{ en: "That pisses me off", ko: "저게 날 화나게 해", etym: "매우 불쾌하고 화나게 만든다는 뜻의 다소 거친 표현입니다.", ex: "The way he treats his staff really pisses me off." },
{ en: "It winds me up", ko: "그건 날 화나게 해", etym: "태엽을 감듯(wind up) 누군가의 감정을 팽팽하게 긴장시켜 폭발하게 만든다는 비유입니다.", ex: "Please stop making that noise; it really winds me up." },
{ en: "You're pissing me off", ko: "넌 날 짜증 나게 해", etym: "상대방의 행동이 나를 매우 화나게 한다는 직접적인 공격 표현입니다.", ex: "Shut up! You're really pissing me off." },
{ en: "slow down", ko: "진정해 / 속도를 줄여", etym: "너무 격해진 감정이나 속도를 늦추어 차분해지라는 조언입니다.", ex: "Slow down and tell me exactly what happened." },
{ en: "I put up with everything", ko: "나 정말 꾹 참고 있어", etym: "견디기 힘든 것을 내 앞에 두고(put up) 무너지지 않으려 버틴다는 뜻입니다.", ex: "I've put up with his bad behavior for too long." },
{ en: "You are freaking me out", ko: "넌 날 화나게 해 / 겁주게 해", etym: "상대의 이상한 행동이 나를 당황하게 하거나 공포스럽게 만든다는 뜻입니다.", ex: "Stop staring at me like that; you're freaking me out." },
{ en: "calm down = ease up", ko: "진정해, 참아", etym: "긴장을 풀고(ease) 차분하게 가라앉으라는 부드러운 권유입니다.", ex: "Calm down, everything is under control." },
{ en: "enrage", ko: "격분하게 만들다", etym: "상대를 분노(rage) 안으로(en-) 밀어 넣어 몹시 화나게 하는 것입니다.", ex: "The decision to close the school enraged the parents." },
{ en: "lousy weather", ko: "구린 날씨", etym: "이(louse)가 득실거리는 것처럼 아주 불쾌하고 형편없는 날씨를 뜻합니다.", ex: "We stayed home all day because of the lousy weather." },
{ en: "It’s boiling hot", ko: "끓듯이 더운 날씨", etym: "물이 끓는(boiling) 온도처럼 아주 뜨거운 폭염을 묘사합니다.", ex: "Don't go outside without water; it's boiling hot." },
{ en: "It’s pouring rain", ko: "소나기가 내려요", etym: "양동이로 물을 들이붓듯(pouring) 비가 아주 많이 오는 상태입니다.", ex: "I'm soaked because it's pouring rain outside." },
{ en: "It’s clearing up", ko: "날씨가 개요", etym: "흐렸던 하늘이 맑게(clear) 정리되어(up) 밝아지는 모습입니다.", ex: "The rain has stopped and it's starting to clear up." },
{ en: "It’s overcast", ko: "날씨가 흐려요", etym: "하늘 전체에 구름이 그림자처럼 덮여(cast over) 어두운 상태입니다.", ex: "It's a bit overcast, so it might rain later." },
{ en: "thaw", ko: "녹다 (=melt)", etym: "얼었던 것이 따뜻한 기운에 서서히 풀리는 현상입니다.", ex: "The snow is starting to thaw as spring approaches." },
{ en: "drizzle", ko: "가랑비", etym: "이슬비처럼 아주 가늘게 내리는 비입니다.", ex: "It's just a light drizzle, so you don't need an umbrella." },
{ en: "it can never go wrong with chicken", ko: "치킨은 언제나 옳지", etym: "치킨과 함께라면 절대 잘못될(go wrong) 수 없다는 확고한 믿음의 유머입니다.", ex: "What should we eat? Well, it can never go wrong with chicken." },
{ en: "I didn’t see this coming", ko: "전혀 몰랐어", etym: "이런 일이 다가오고(coming) 있는 줄 미리 보지(see) 못했다는 뜻입니다.", ex: "Wow, a surprise party! I really didn't see this coming." },
{ en: "see for yourself", ko: "직접 확인해봐", etym: "내 말을 믿기보다 너 자신의 눈으로(for yourself) 직접 보라는 권유입니다.", ex: "The view is amazing. Go and see for yourself." },
{ en: "Let’s not bring that up (Don’t bring that up)", ko: "그 얘긴 하지 말자", etym: "바닥에 가라앉은 화제를 다시 위로(up) 가져오지(bring) 말자는 뜻입니다.", ex: "He's still sad about the breakup, so let's not bring that up." },
{ en: "The payment has been processed", ko: "결제가 완료되었습니다", etym: "지불 단계가 절차(process)에 따라 성공적으로 마무리되었음을 뜻합니다.", ex: "Your order is confirmed; the payment has been processed." },
{ en: "confront", ko: "마주하다, 맞서다, 직면하다", etym: "얼굴(front)을 함께(con-) 마주 보고 당당히 맞서는 행동입니다.", ex: "You need to confront your fears." },
{ en: "proprietary", ko: "소유자의, 등록 상표가 붙은", etym: "특정 개인이나 회사가 소유권(property)을 가진 독점적인 자산입니다.", ex: "The company uses proprietary software for its data analysis." },
{ en: "pump iron", ko: "쇠질하다 (운동)", etym: "무거운 철(iron) 덩어리를 펌프질하듯 들어 올리며 근력 운동을 하는 모습입니다.", ex: "He goes to the gym every morning to pump iron." },
{ en: "get in shape", ko: "몸매를 만들다", etym: "자신의 몸을 보기 좋은 형태(shape)로 가꾼다는 뜻입니다.", ex: "I'm trying to get in shape for the summer." },
{ en: "Rock hard abs", ko: "돌처럼 단단한 복근", etym: "근육이 매우 발달하여 바위처럼 단단한 복근(abs)을 묘사합니다.", ex: "He worked out for months to get those rock hard abs." },
{ en: "It’s perfect time to shed those unsightly pounds", ko: "보기 흉한 살을 빼기 딱 좋은 시간이야", etym: "불필요한 무게(pounds)를 뱀이 허물을 벗듯(shed) 제거한다는 비유입니다.", ex: "Spring is here! It's the perfect time to shed those unsightly pounds." },
{ en: "Dog leash", ko: "개 목줄", etym: "개를 통제하기 위해 목에 채우는 끈입니다.", ex: "Don't forget to put the dog leash on before going out." },
{ en: "Unusual breed", ko: "흔치 않은 (화려한) 종", etym: "일반적이지 않은 독특한 품종(breed)의 동물입니다.", ex: "That's an unusual breed of cat; I've never seen one like it." },
{ en: "Can I pet the dog?", ko: "개 만져봐도 돼요?", etym: "동물을 쓰다듬는(pet) 행동을 해도 될지 주인에게 허락을 구하는 말입니다.", ex: "He's so cute! Can I pet the dog?" },
{ en: "walk the dog", ko: "개를 산책시키다", etym: "개와 함께 걸으며(walk) 운동과 배변을 돕는 일상적인 행동입니다.", ex: "It's my turn to walk the dog tonight." },
{ en: "I’m allergic to cat", ko: "고양이 알레르기가 있어요", etym: "고양이 털이나 비듬 등에 신체적 거부 반응(allergy)이 있음을 뜻합니다.", ex: "I'd love to visit, but I'm allergic to cats." },
{ en: "gnaw on", ko: "갉아 먹다", etym: "딱딱한 것을 앞니로 조금씩 갉아내는 동작입니다.", ex: "The dog was gnawing on a bone." },
{ en: "I'm pigging out", ko: "돼지처럼 먹고 있다", etym: "돼지(pig)처럼 통제 없이 엄청난 양의 음식을 먹고 있다는 비유입니다.", ex: "I'm pigging out on pizza and wings tonight." },
{ en: "Maybe you can whip up something quick", ko: "너 뭔가 빠르게 차릴 수 있을 거야 (음식)", etym: "채찍을 휘두르듯(whip) 아주 빠른 속도로 음식을 뚝딱 만들어낸다는 뜻입니다.", ex: "If you're hungry, I can whip up something quick like an omelet." },
{ en: "We can't live on berries and roots", ko: "열매와 뿌리만 먹고 살 수는 없다", etym: "아주 기본적인 것이나 부족한 것만으로는 생존이 힘들다는 비유입니다.", ex: "We need real food; we can't live on berries and roots." },
{ en: "Rustle up some grub", ko: "음식을 뚝딱 차리다", etym: "나뭇잎 부스럭거리는 소리(rustle)를 내며 서둘러 음식(grub)을 준비하는 모습입니다.", ex: "Give me ten minutes, and I'll rustle up some grub." },
{ en: "Cut back on the sweets", ko: "단것을 줄이다", etym: "지출이나 섭취량을 뒤로 깎아내어(cut back) 양을 조절한다는 뜻입니다.", ex: "I need to cut back on the sweets to lose weight." },
{ en: "clog (clogged)", ko: "막히다", etym: "파이프나 통로가 이물질로 인해 꽉 막힌 상태입니다.", ex: "The kitchen sink is clogged again." },
{ en: "who left the blinds open?", ko: "누가 블라인드를 열어놨지?", etym: "창문의 가림개(blinds)를 닫지 않고 그대로 둔 사람을 찾는 질문입니다.", ex: "It's too bright in here. Who left the blinds open?" },
{ en: "loss leader", ko: "미끼 상품", etym: "손해(loss)를 보더라도 손님을 끌어들이기 위해(leader) 아주 싸게 파는 전략적 상품입니다.", ex: "The $1 milk is just a loss leader to get people into the store." },
{ en: "It’s nice to put a face to the name", ko: "말로만 듣다가 직접 만나게 되어 반갑다", etym: "이름(name)만 알고 있던 대상에게 실제 얼굴(face)을 대입해 본다는 정중한 첫인사입니다.", ex: "I've heard so much about you. It's nice to put a face to the name." },
{ en: "comforter / quilt", ko: "이불", etym: "몸을 따뜻하고 편안하게(comfort) 해주는 두툼한 덮개입니다.", ex: "I love snuggling under my warm comforter." },
{ en: "detergent", ko: "세제", etym: "옷이나 그릇의 때를 씻어내는 화학 물질입니다.", ex: "We need to buy some laundry detergent." },
{ en: "Do you happen to have health insurance?", ko: "혹시 건강보험 가지고 계신가요? (공손)", etym: "상대에게 실례가 되지 않도록 '혹시(happen to)'를 붙여 조심스럽게 묻는 질문입니다.", ex: "Excuse me, do you happen to have health insurance?" },
{ en: "like to get to know you", ko: "너랑 친해지고 싶어", etym: "상대에 대해 더 많이 알고(know) 관계를 발전시키고 싶다는 뜻입니다.", ex: "You seem interesting; I'd like to get to know you better." },
{ en: "ash", ko: "재, 잿더미", etym: "불에 타고 남은 가루 형태의 잔해입니다.", ex: "The volcano covered the entire village in ash." },
{ en: "brass", ko: "놋쇠", etym: "구리와 아연의 합금으로, 금색 빛이 나는 금속입니다.", ex: "The door handle is made of solid brass." },
{ en: "I have a sore throat", ko: "목감기가 있어요 / 목이 아파요", etym: "목 안쪽이 따갑거나 아픈(sore) 상태를 뜻합니다.", ex: "I can't swallow properly because I have a sore throat." },
{ en: "what are your symptoms?", ko: "증상이 뭔가요?", etym: "환자가 느끼는 구체적인 몸의 이상 징후(symptoms)를 묻는 의학적 질문입니다.", ex: "The nurse asked, 'What are your symptoms?'" },
{ en: "I’ve heard a great deal about you", ko: "얘기 많이 들었습니다", etym: "당신에 대해 아주 많은 양(a great deal)의 소식을 들었다는 정중한 인사입니다.", ex: "It's an honor to meet you; I've heard a great deal about you." },
{ en: "you’re in good hands", ko: "믿고 맡겨도 돼요 / 안심하세요", etym: "능숙하고 선한 사람의 손(hands) 안에 보호받고 있다는 든든한 비유입니다.", ex: "Don't worry about the surgery; you're in good hands with Dr. Smith." },
{ en: "that’s a bummer", ko: "아쉽네요 / 안됐네요", etym: "실망스럽거나 안 좋은 소식을 들었을 때 공감하며 내뱉는 가벼운 감탄사입니다.", ex: "You can't come to the party? That's a bummer." },
{ en: "to know the ins and outs", ko: "속속들이 알다", etym: "어떤 일의 안쪽(ins)과 바깥쪽(outs) 구석구석을 모두 파악하고 있다는 뜻입니다.", ex: "He has worked here for 20 years, so he knows the ins and outs of the business." },
{ en: "Catch-22", ko: "진퇴양난, 딜레마", etym: "특정 조건을 충족해야 탈출할 수 있는데, 그 조건 자체가 모순되어 영원히 빠져나올 수 없는 상황을 뜻하는 소설 제목에서 유래했습니다.", ex: "I need experience to get a job, but I need a job to get experience. It's a Catch-22." },
{ en: "to be on cloud nine", ko: "구름 위를 걷는 기분이다", etym: "기상학에서 가장 높이 떠 있는 구름 종류를 '9번 구름'이라 부른 데서 유래한 최고의 행복 상태입니다.", ex: "She's been on cloud nine ever since she got engaged." },
{ en: "like two peas in a pod", ko: "서로 꼭 닮은 / 아주 가까운", etym: "완두콩 꼬투리(pod) 안에 들어있는 두 알의 콩(peas)처럼 구분이 안 될 정도로 닮은 모습입니다.", ex: "The twins are like two peas in a pod." },
{ en: "band over backwards", ko: "특별한 노력을 기울이다 (원문 bend over backwards)", etym: "허리를 뒤로 굽혀(bend) 묘기를 부리듯, 상대를 기쁘게 하거나 목표를 위해 혼신의 힘을 다한다는 뜻입니다.", ex: "I bent over backwards to help him, but he didn't even say thank you." },
{ en: "Drive off", ko: "떠나다", etym: "차를 운전해서(drive) 현장에서 멀어져(off) 가는 동작입니다.", ex: "He waved goodbye and drove off." },
{ en: "Drop off", ko: "차로 데려다주다 / 갖다 놓다", etym: "가던 길에 특정 대상을 툭 떨어뜨려(drop) 내려주고 간다는 뜻입니다.", ex: "Can you drop me off at the station?" },
{ en: "Take off / Touch down", ko: "이륙 / 착륙", etym: "땅에서 떨어져(off) 날아오르는 것과 지면에 닿는(touch) 항공 용어입니다.", ex: "The plane is ready to take off." },
{ en: "He set off to sea", ko: "그는 바다로 떠났다", etym: "어떤 여정을 위해 준비를 마치고 출발(set off)하는 모습입니다.", ex: "Early in the morning, he set off to sea." },
{ en: "Stop off somewhere", ko: "어딘가 들르다", etym: "최종 목적지로 가는 길에 잠시 멈춰(stop) 시간을 보내는 것입니다.", ex: "Let's stop off at a cafe on our way home." },
{ en: "I got to get off this bus", ko: "버스에서 내려야 합니다", etym: "타고 있던 교통수단에서 밖으로 나가야(get off) 한다는 뜻입니다.", ex: "This is my stop; I got to get off this bus." },
{ en: "knock somebody down", ko: "누군가를 차로 치다 / 때려눕히다", etym: "충격을 가해 상대를 바닥으로 쓰러뜨리는(down) 거친 동작입니다.", ex: "The cyclist was nearly knocked down by a car." },
{ en: "Go through a red light.", ko: "빨간불에 지나가다", etym: "신호를 무시하고 교차로를 통과해(through) 가버리는 위험한 행동입니다.", ex: "He was fined for going through a red light." },
{ en: "You ran into my car.", ko: "네가 내 차를 박았어", etym: "운전 중에 실수로 다른 차 안으로(into) 달려들어(run) 충돌했다는 뜻입니다.", ex: "Hey! You just ran into my car!" },
{ en: "a mere acquaintance", ko: "아는 사람, 지인", etym: "절친(bestie)이 아닌 그저 면식만 있는 정도(mere)의 관계를 뜻합니다.", ex: "We aren't close friends; we're just mere acquaintances." },
{ en: "here’s the twist", ko: "여기 반전이 있다", etym: "이야기가 직선으로 가지 않고 비틀려(twist) 예상치 못한 결말로 갈 때 씁니다.", ex: "Everything seemed normal, but here's the twist: it was all a dream." },
{ en: "Don’t sweat it. No harm done.", ko: "걱정마. 그리 큰일 아니야.", etym: "땀(sweat) 흘릴 정도로 긴장하지 말라는 위로와, 아무런 피해(harm)가 없었다는 안심의 말입니다.", ex: "I'm sorry I'm late. — Don't sweat it. No harm done." },
{ en: "Pull yourself together.", ko: "정신 차려 / 마음을 가다듬어", etym: "조각난 멘탈을 다시 하나로 끌어모아(pull together) 진정하라는 강한 충고입니다.", ex: "Stop crying and pull yourself together!" },
{ en: "Brace yourself.", ko: "마음 단단히 먹어", etym: "충격에 대비해 몸에 힘을 주거나 지지대(brace)를 대듯, 안 좋은 소식에 대비하라는 뜻입니다.", ex: "Brace yourself; the news is not good." },
{ en: "No hard feelings", ko: "기분 나쁘게 생각하지 마", etym: "서로 간에 딱딱하고(hard) 앙금 섞인 감정이 남지 않기를 바랄 때 씁니다.", ex: "We can still be friends, right? No hard feelings." },
{ en: "As hard as nails", ko: "감정이 메말랐다 / 아주 냉혹하다", etym: "쇠못(nails)처럼 아주 딱딱하고(hard) 차가워서 자비가 없는 성격을 비유합니다.", ex: "The new boss is as hard as nails; she never smiles." },
{ en: "what a letdown", ko: "실망인데!", etym: "높았던 기대치를 아래로 떨어뜨린(let down) 실망스러운 상황에 대한 탄식입니다.", ex: "The concert was so short. What a letdown!" },
{ en: "Go to pieces", ko: "절망하다 / 산산조각 나다", etym: "너무 큰 충격으로 마음이 여러 조각(pieces)으로 부서져 제 기능을 못 하는 상태입니다.", ex: "She went to pieces when she heard the tragic news." },
{ en: "It's so gross", ko: "역겨워", etym: "외관상 지저분하거나 도덕적으로 불쾌해서 구역질이 날 것 같을 때 씁니다.", ex: "Ugh, look at that moldy bread. It's so gross!" },
{ en: "I have mixed feelings.", ko: "복잡한 심정이야", etym: "좋은 감정과 나쁜 감정이 뒤섞여(mixed) 있어 딱 잘라 말하기 어려운 상태입니다.", ex: "I'm happy for her, but I'm also sad. I have mixed feelings." },
{ en: "we have chemistry", ko: "잘 어울리다 / 케미가 좋다", etym: "두 사람 사이의 화학(chemistry) 반응처럼 자연스럽고 강하게 끌리는 기류가 있다는 뜻입니다.", ex: "From the first date, we knew we had great chemistry." },
{ en: "Jot that down", ko: "받아적다 / 메모하다", etym: "잊어버리지 않게 종이에 재빨리 적어두는 행동입니다.", ex: "That's a good idea. Let me jot that down." },
{ en: "I've been made redundant.", ko: "해고당했다 (경영상의 이유)", etym: "내가 불필요한(redundant) 존재가 되어 회사에서 내보내졌다는 격식 있는 표현입니다.", ex: "The company is downsizing, so I've been made redundant." },
{ en: "I want to hand in my notice.", ko: "사직서를 제출하고 싶습니다", etym: "회사를 그만두겠다는 공식적인 통보(notice)를 직접 건네주다(hand in)는 뜻입니다.", ex: "I found a better job, so I'm going to hand in my notice today." },
{ en: "We're gonna have to let you go.", ko: "당신을 해고해야겠습니다", etym: "직접적으로 '해고'라고 하지 않고 당신을 놓아주겠다(let you go)고 완곡하게 표현하는 방식입니다.", ex: "I'm sorry, but due to your performance, we're gonna have to let you go." },
{ en: "get the sack", ko: "해고당하다", etym: "과거에 장인이 해고될 때 자신의 도구를 담을 자루(sack)를 돌려받은 데서 유래한 표현입니다.", ex: "He got the sack for being late every day." },
{ en: "This isn't gonna work out", ko: "아마 잘 되지 않을 거야", etym: "관계나 일이 원만하게 해결되거나(work out) 성공할 것 같지 않다는 부정적 전망입니다.", ex: "I think we should break up; this isn't gonna work out." },
{ en: "redundant", ko: "정리해고당한 / 불필요한", etym: "넘쳐서 더 이상 필요 없는 상태를 뜻하며, 주로 직장에서 인력 감축 시 쓰입니다.", ex: "Computers have made many manual jobs redundant." },
{ en: "to sum up = to recap", ko: "요약하자면", etym: "흩어진 내용들을 하나로 합산(sum)하거나 다시 뚜껑을 덮듯(recap) 핵심을 짚는 것입니다.", ex: "To sum up, we need to increase our sales." },
{ en: "which brings me to my next point", ko: "이것이 저를 다음 주제로 이끄네요", etym: "앞의 내용과 자연스럽게 연결하여 다음 할 말로 넘어갈 때 쓰는 발표용 표현입니다.", ex: "Our budget is limited, which brings me to my next point: cost-cutting." },
{ en: "As you all know...", ko: "여러분 모두 아시다시피...", etym: "참석자들이 이미 인지하고 있는 사실을 전제로 말을 시작할 때 씁니다.", ex: "As you all know, the deadline is tomorrow." },
{ en: "with all due respect", ko: "외람되지만 / 송구스럽지만", etym: "상대에게 마땅히(due) 드려야 할 존경(respect)을 담아, 반대 의견을 말하기 전 쓰는 표현입니다.", ex: "With all due respect, I don't think that's a good idea." },
{ en: "petty cash", ko: "소액 현금", etym: "사소한(petty) 사무용품 등을 사기 위해 회사에 비치해둔 소액의 현금입니다.", ex: "Use the petty cash to buy some more printer paper." },
{ en: "speaking of return on investment", ko: "투자 수익에 대해 말하자면", etym: "투자한 것에 대해 돌아오는(return) 이득(ROI)으로 화제를 전환할 때 씁니다.", ex: "Speaking of return on investment, our new strategy is working." },
{ en: "pay off", ko: "보상받다 / 성공하다", etym: "그동안의 노력이 빚을 갚듯(pay off) 성공적인 결과로 돌아오는 모습입니다.", ex: "All those hours of practice finally paid off." },
{ en: "give me a ballpark figure", ko: "대략적인 수치를 알려줘", etym: "야구 경기장(ballpark) 안이라면 어디든 상관없듯, 정확하진 않아도 근사치를 달라는 뜻입니다.", ex: "I don't need the exact cost; just give me a ballpark figure." },
{ en: "from the ground up", ko: "처음부터 / 밑바닥부터", etym: "지면(ground)에서부터 건물을 올리듯 아무것도 없는 상태에서 시작한다는 비유입니다.", ex: "He built his business from the ground up." },
{ en: "play hardball", ko: "엄격히 다루다 / 강경하게 나가다", etym: "부드러운 공이 아닌 딱딱한 야구공(hardball)으로 경기를 하듯, 거칠고 타협 없는 태도를 뜻합니다.", ex: "If they won't lower the price, we'll have to play hardball." },
{ en: "it’s not rocket science", ko: "그리 어렵지 않아", etym: "로켓 공학(rocket science)처럼 아주 복잡하고 고도의 지능이 필요한 일이 아니라는 뜻입니다.", ex: "Just follow the instructions; it's not rocket science." },
{ en: "corner the market, raise the price", ko: "시장을 장악하고 가격을 올리다", etym: "시장 구석(corner)까지 몰아넣어 독점하고 영향력을 행사한다는 경제적 비유입니다.", ex: "Once they corner the market, they will surely raise the prices." },
{ en: "elusive", ko: "찾기 힘든 / 알기 어려운", etym: "교묘하게 빠져나가는(elude) 성질이 있어 잡거나 정의하기 힘든 상태입니다.", ex: "Success remains elusive for many young artists." },
{ en: "ping me", ko: "제게 알려주세요 (메신저 등)", etym: "잠수함의 음파 탐지기 소리(ping)처럼 가볍게 신호를 보내 연락해달라는 뜻입니다.", ex: "When you finish the report, just ping me." },
{ en: "irrational", ko: "비이성적인", etym: "이성(ratio)이나 논리가 없는(ir-) 상태로, 감정에 치우친 행동을 뜻합니다.", ex: "She has an irrational fear of spiders." },
{ en: "fiend", ko: "~에 미친 사람 (광팬)", etym: "원래 '악마'라는 뜻이지만, 특정 대상에 중독되거나 아주 집착하는 사람을 비유합니다.", ex: "I'm a real coffee fiend; I drink five cups a day." },
{ en: "quite dull", ko: "꽤 지루해", etym: "날카롭지 않고 무딘(dull) 것처럼 흥미가 없고 단조로운 상태입니다.", ex: "The lecture was quite dull." },
{ en: "arrogant", ko: "거만한", etym: "자신이 모든 권리(rog-)를 가진 것처럼 오만하게 구는 태도입니다.", ex: "Nobody likes him because he is so arrogant." },
{ en: "if it wasn’t for you", ko: "네가 아니었다면", etym: "특정 인물의 도움이나 존재가 없었을 상황을 가정한 감사의 표현입니다.", ex: "I would have failed if it wasn't for you." },
{ en: "you’ve got a lot of nerve", ko: "너 정말 뻔뻔하다", etym: "두꺼운 신경(nerve), 즉 배짱이나 뻔뻔함이 아주 대단하다며 비꼬는 말입니다.", ex: "You've got a lot of nerve showing up here after what you did." },
{ en: "you catch on quick", ko: "너 눈치가 빠르네 / 습득이 빠르네", etym: "던져진 정보를 빨리 붙잡아(catch on) 이해한다는 칭찬입니다.", ex: "I only showed him once, and he did it perfectly. He catches on quick." },
{ en: "a watched pot never boils", ko: "조급해하면 안 된다", etym: "냄비를 쳐다보고(watched) 있으면 더디게 끓는 것처럼 느껴지니 여유를 가지라는 격언입니다.", ex: "Stop checking your email every minute. A watched pot never boils." },
{ en: "Don’t give me that", ko: "변명하지 마 / 니 말 안 믿어", etym: "그런 뻔한 소리나 변명을 나에게 주지(give) 말라며 일축하는 표현입니다.", ex: "You were too busy? Don't give me that; I saw you playing games." },
{ en: "Read the room", ko: "눈치 좀 챙겨 / 분위기 파악해", etym: "방(room) 안의 공기나 사람들의 기류를 읽으라는(read) 따끔한 충고입니다.", ex: "Stop making jokes; read the room." },
{ en: "monuments", ko: "기념물", etym: "중요한 인물이나 사건을 기억(mon-)하기 위해 세운 건축물입니다.", ex: "The city is famous for its historic monuments." },
{ en: "How many times do I have to tell you?", ko: "도대체 몇 번을 말해야겠니?", etym: "반복되는 잘못에 대해 답답함을 표현하는 전형적인 꾸중의 문구입니다.", ex: "Don't leave your socks on the floor! How many times do I have to tell you?" },
{ en: "don’t be so dramatic", ko: "너무 오바하지 마", etym: "연극(drama) 속 주인공처럼 상황을 지나치게 과장하거나 비극적으로 만들지 말라는 뜻입니다.", ex: "It's just a small scratch. Don't be so dramatic." },
{ en: "why would we do that", ko: "우리가 그걸 왜 해야 하는데?", etym: "제안된 행동의 타당성이나 이유를 강하게 되묻는 회의적인 질문입니다.", ex: "Go out in the rain? Why would we do that?" },
{ en: "white lie", ko: "선의의 거짓말", etym: "상처를 주지 않기 위해 하는 깨끗한(white) 거짓말입니다.", ex: "I told her I liked her hat. It was just a white lie." },
{ en: "consider it done", ko: "바로 처리할게", etym: "말씀하신 순간 이미 완료된(done) 것으로 생각(consider)해도 될 만큼 확실히 하겠다는 약속입니다.", ex: "Need a reservation? Consider it done." },
{ en: "not on my watch", ko: "내 눈앞에선 용납 못 해", etym: "내가 감시(watch)하고 있는 시간 동안에는 절대 그런 일이 벌어질 수 없다는 강한 의지입니다.", ex: "You're going to quit? Not on my watch!" },
{ en: "i’m glad that we hit it off", ko: "우리가 너무 잘 맞아서 다행이야", etym: "첫 만남에서 불꽃이 튀듯(hit it off) 금방 친해진 상황에 대한 기쁨의 표현입니다.", ex: "I was nervous about our first date, but I'm glad we hit it off." },
{ en: "don’t beat yourself up", ko: "자책하지 마", etym: "실수한 자신을 주먹으로 때리듯(beat up) 가혹하게 괴롭히지 말라는 위로입니다.", ex: "Everyone makes mistakes. Don't beat yourself up about it." },
{ en: "I don’t think you mean that", ko: "넌 진심이 아닌 것 같아", etym: "상대방이 뱉은 말이 그의 본래 의도(mean)와 다르다고 생각될 때 씁니다.", ex: "You said you hate me, but I don't think you mean that." },
{ en: "I wasted all day in a wild goose chase", ko: "하루종일 헛수고만 했어", etym: "잡기 힘든 야생 거위(wild goose)를 쫓듯, 애초에 성과가 없을 일을 찾아다녔다는 비유입니다.", ex: "The address was wrong, so I spent the afternoon on a wild goose chase." },
{ en: "give or take an hour", ko: "대략 한 시간 정도", etym: "정확한 수치에서 한 시간 정도를 더하거나(give) 빼도(take) 된다는 근사치 표현입니다.", ex: "The trip will take five hours, give or take an hour." },

    let myData = JSON.parse(localStorage.getItem('etym_voca_custom')) || [];
    let combinedData = [...baseData, ...myData];
    let currentIndex = 0;
    let knownWords = JSON.parse(localStorage.getItem('etym_known')) || [];
    let favorites = JSON.parse(localStorage.getItem('etym_favs')) || [];

    function updateStats() {
        const pool = combinedData.filter(w => !knownWords.includes(w.en));
        document.getElementById('progress-text').innerText = `남은 단어: ${pool.length} / 전체: ${combinedData.length}`;
    }

    function nextWord() {
        const pool = combinedData.filter(w => !knownWords.includes(w.en));
        if (pool.length === 0) { alert("모든 단어 마스터!"); return; }
        const nextItem = pool[Math.floor(Math.random() * pool.length)];
        currentIndex = combinedData.findIndex(w => w.en === nextItem.en);
        
        document.getElementById('word').innerText = nextItem.en;
        
        // 상단 박스 숨김 상태로 리셋
        document.getElementById('etym-box').style.visibility = 'hidden';
        document.getElementById('mean-box').style.visibility = 'hidden';
        document.getElementById('ex-box').style.visibility = 'hidden';
        
        document.getElementById('fav-btn').classList.toggle('active', favorites.includes(nextItem.en));
        updateStats();
    }

    function showEtymology() {
        const box = document.getElementById('etym-box');
        box.innerText = "📜 " + (combinedData[currentIndex].etym || "어원 정보가 없습니다.");
        box.style.visibility = 'visible';
    }

    function showContent() {
        const mBox = document.getElementById('mean-box');
        const eBox = document.getElementById('ex-box');
        const item = combinedData[currentIndex];
        
        mBox.innerText = item.ko;
        eBox.innerHTML = `<strong>Ex:</strong> ${item.ex || '등록된 예문이 없습니다.'}`;
        
        mBox.style.visibility = 'visible';
        eBox.style.visibility = 'visible';
    }

    function speak() {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(combinedData[currentIndex].en);
        const voices = window.speechSynthesis.getVoices();
        const nativeVoice = voices.find(v => v.name === 'Google US English') || voices.find(v => v.lang === 'en-US');
        if (nativeVoice) msg.voice = nativeVoice;
        msg.rate = 0.88;
        window.speechSynthesis.speak(msg);
    }

    function markAsKnown() {
        knownWords.push(combinedData[currentIndex].en);
        localStorage.setItem('etym_known', JSON.stringify(knownWords));
        nextWord();
    }

    function toggleFavorite() {
        const word = combinedData[currentIndex].en;
        if (favorites.includes(word)) favorites = favorites.filter(f => f !== word);
        else favorites.push(word);
        localStorage.setItem('etym_favs', JSON.stringify(favorites));
        document.getElementById('fav-btn').classList.toggle('active');
    }

    function openModal() { document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    
    function addNewWord() {
        const en = document.getElementById('new-en').value.trim();
        const ko = document.getElementById('new-ko').value.trim();
        const etym = document.getElementById('new-etym').value.trim();
        const ex = document.getElementById('new-ex').value.trim();
        if (!en || !ko) return;
        myData.push({ en, ko, etym, ex });
        localStorage.setItem('etym_voca_custom', JSON.stringify(myData));
        combinedData = [...baseData, ...myData];
        closeModal();
        updateStats();
    }

    function resetData() { if(confirm("학습 기록을 지울까요?")) { localStorage.clear(); location.reload(); } }

    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    nextWord();
</script>
