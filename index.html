<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Voca Pro - Ultimate</title>
    <style>
        :root { --primary: #6366f1; --bg: #f1f5f9; --accent: #f59e0b; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        /* 메인 카드 컨테이너 */
        .container { width: 95%; max-width: 420px; background: white; padding: 30px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); text-align: center; position: relative; }
        
        /* 상단 상태 표시 */
        .stats { font-size: 0.85rem; color: #94a3b8; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .reset-btn { font-size: 0.75rem; color: #cbd5e1; cursor: pointer; text-decoration: underline; border: none; background: none; }

        /* 이미지 박스 (수동 로드 방식) */
        #img-box { width: 100%; height: 210px; background: #f8fafc; border-radius: 20px; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px dashed #e2e8f0; }
        #word-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .img-placeholder { color: #94a3b8; font-size: 0.85rem; padding: 20px; line-height: 1.5; }

        /* 단어 텍스트 */
        #word { font-size: 2.6rem; font-weight: 800; color: #1e293b; margin: 15px 0; letter-spacing: -1px; }
        
        /* 뜻 & 예문 (숨김 영역) */
        #content-area { display: none; margin-top: 20px; animation: fadeIn 0.3s ease; }
        #mean { font-size: 1.4rem; color: var(--primary); font-weight: 700; margin-bottom: 12px; }
        .ex-box { background: #f9fafb; padding: 18px; border-radius: 15px; text-align: left; font-size: 0.95rem; line-height: 1.6; color: #475569; border: 1px solid #f1f5f9; }

        /* 제어 버튼 그룹 */
        .control-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        button { border: none; border-radius: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; outline: none; }
        
        .btn-view { background: #f1f5f9; color: #475569; padding: 14px; font-size: 0.9rem; }
        .btn-audio { background: #eef2ff; color: #4f46e5; padding: 14px; font-size: 0.9rem; }
        .btn-next { background: #1e293b; color: white; padding: 18px; grid-column: span 2; font-size: 1.1rem; box-shadow: 0 4px 12px rgba(30,41,59,0.2); }
        
        /* 알아요 버튼 (실수 방지용 작고 슬림한 디자인) */
        .btn-know { background: #fff; color: #059669; padding: 6px 14px; font-size: 0.75rem; margin-top: 30px; border: 1px solid #dcfce7; border-radius: 20px; display: inline-flex; align-items: center; gap: 4px; }
        .btn-know:hover { background: #f0fdf4; }

        /* 즐겨찾기 별 아이콘 */
        .fav-star { position: absolute; top: 28px; right: 28px; font-size: 1.6rem; color: #e2e8f0; cursor: pointer; transition: 0.2s; z-index: 5; }
        .fav-star.active { color: var(--accent); transform: scale(1.1); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        button:active { transform: scale(0.97); }
    </style>
</head>
<body>

<div class="container">
    <div class="fav-star" id="fav-btn" onclick="toggleFavorite()">★</div>
    
    <div class="stats">
        <span id="progress-text">로딩 중...</span>
        <button class="reset-btn" onclick="resetData()">학습 초기화</button>
    </div>

    <div id="img-box">
        <div class="img-placeholder" id="placeholder-text">연상 이미지가 필요하면<br>아래 [이미지 보기] 버튼을 누르세요</div>
        <img id="word-img" src="" alt="word image">
    </div>

    <div id="word">Word</div>

    <div class="control-btns">
        <button class="btn-view" onclick="showImage()">🖼️ 이미지 보기</button>
        <button class="btn-view" onclick="showContent()">📖 뜻·예문 보기</button>
        <button class="btn-audio" onclick="speak()">🔊 원어민 발음</button>
        <button class="btn-next" onclick="nextWord()">다음 단어 (Next)</button>
    </div>

    <div id="content-area">
        <div id="mean">의미</div>
        <div id="ex-box" class="ex-box"></div>
    </div>

    <button class="btn-know" onclick="markAsKnown()">✅ 이 단어는 마스터했어요</button>
</div>

<script>
    // 단어 데이터 (최신 60개 기준)
    const vocabulary = [
        { en: "Cut corners", ko: "절차를 생략하다, 편법을 쓰다", ex: "Don't cut corners on safety.", exKo: "안전에 있어서 편법을 쓰지 마세요." },
        { en: "In the black", ko: "흑자인", ex: "The company is finally in the black.", exKo: "회사가 드디어 흑자로 돌아섰다." },
        { en: "Get a grip", ko: "정신 차려, 평정심을 찾아", ex: "Get a grip on yourself!", exKo: "정신 좀 차려!" },
        { en: "Play devil's advocate", ko: "일부러 반대 의견을 제시하다", ex: "Let me play devil's advocate.", exKo: "제가 잠시만 반대 입장에서 말해볼게요." },
        { en: "Pull out all the stops", ko: "온 힘을 다하다", ex: "They pulled out all the stops.", exKo: "그들은 모든 수단을 동원했다." },
        { en: "Sleep on it", ko: "심사숙고하다", ex: "Don't decide now, sleep on it.", exKo: "지금 결정하지 말고 하룻밤 생각해보렴." },
        { en: "Hit the books", ko: "열공하다", ex: "I need to hit the books tonight.", exKo: "나 오늘 밤에 열공해야 해." },
        { en: "Wait for the dust to settle", ko: "사태가 진정되기를 기다리다", ex: "Let's wait for the dust to settle.", exKo: "상황이 좀 가라앉을 때까지 기다려보자." },
        { en: "Beat around the bush", ko: "돌려서 말하다", ex: "Stop beating around the bush!", exKo: "말 돌리지 마!" },
        { en: "Cold feet", ko: "겁이 남, 주춤함", ex: "He got cold feet before the wedding.", exKo: "그는 결혼식 직전에 겁을 먹었다." },
        { en: "Give someone the cold shoulder", ko: "무시하다, 냉대하다", ex: "She gave me the cold shoulder.", exKo: "그녀는 나를 냉대했다." },
        { en: "Go down in flames", ko: "참담하게 실패하다", ex: "The project went down in flames.", exKo: "프로젝트가 완전히 실패로 돌아갔다." },
        { en: "Jump on the bandwagon", ko: "시류에 편승하다", ex: "Everyone is jumping on the bandwagon.", exKo: "모두가 그 유행을 따르고 있다." },
        { en: "Let the cat out of the bag", ko: "비밀을 누설하다", ex: "Who let the cat out of the bag?", exKo: "누가 비밀을 발설했어?" },
        { en: "Miss the boat", ko: "기회를 놓치다", ex: "You missed the boat on that deal.", exKo: "그 거래 기회를 놓치셨네요." },
        { en: "On the fence", ko: "결정을 못 내린", ex: "I'm still on the fence about it.", exKo: "난 아직 고민 중이야." }
        // ... (나머지 단어들도 이 형식으로 추가하시면 됩니다)
    ];

    let currentIndex = 0;
    // 즐겨찾기 및 아는 단어 데이터 LocalStorage 연동
    let favorites = JSON.parse(localStorage.getItem('voca_favs')) || [];
    let knownWords = JSON.parse(localStorage.getItem('voca_known')) || [];

    function updateStats() {
        const pool = vocabulary.filter(w => !knownWords.includes(w.en));
        document.getElementById('progress-text').innerText = `남은 미암기 단어: ${pool.length}개`;
    }

    function nextWord() {
        const pool = vocabulary.filter(w => !knownWords.includes(w.en));
        
        if (pool.length === 0) {
            alert("🎉 모든 단어를 마스터하셨습니다! 학습 기록을 초기화합니다.");
            resetData();
            return;
        }

        const nextItem = pool[Math.floor(Math.random() * pool.length)];
        currentIndex = vocabulary.findIndex(w => w.en === nextItem.en);
        
        // 화면 초기화
        document.getElementById('word').innerText = nextItem.en;
        document.getElementById('content-area').style.display = 'none';
        document.getElementById('word-img').style.display = 'none';
        document.getElementById('placeholder-text').style.display = 'block';
        document.getElementById('placeholder-text').innerHTML = "연상 이미지가 필요하면<br>아래 [이미지 보기] 버튼을 누르세요";
        
        // 즐겨찾기 상태 반영
        document.getElementById('fav-btn').classList.toggle('active', favorites.includes(nextItem.en));
        
        updateStats();
    }

    function showContent() {
        const item = vocabulary[currentIndex];
        document.getElementById('mean').innerText = item.ko;
        document.getElementById('ex-box').innerHTML = `<strong>Example:</strong><br>${item.ex}<br><small style="color:#94a3b8">${item.exKo}</small>`;
        document.getElementById('content-area').style.display = 'block';
    }

    function showImage() {
        const item = vocabulary[currentIndex];
        const img = document.getElementById('word-img');
        const placeholder = document.getElementById('placeholder-text');
        
        placeholder.innerText = "이미지를 불러오는 중...";
        
        // 검색어 최적화: 마지막 단어를 키워드로 사용
        const keyword = item.en.split(' ').pop();
        const randomSeed = Math.floor(Math.random() * 1000);
        
        img.src = `https://loremflickr.com/400/300/${keyword},concept/all?lock=${randomSeed}`;
        
        img.onload = () => {
            img.style.display = 'block';
            placeholder.style.display = 'none';
        };
        img.onerror = () => {
            placeholder.innerText = "이미지를 찾을 수 없습니다. (탭하여 다시 시도)";
        };
    }

    function speak() {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(vocabulary[currentIndex].en);
        
        const voices = window.speechSynthesis.getVoices();
        // 가장 자연스러운 미국 원어민 음성 선택
        const selectedVoice = voices.find(v => v.name.includes('Google US English')) || 
                            voices.find(v => v.lang === 'en-US');
        
        if (selectedVoice) msg.voice = selectedVoice;
        msg.rate = 0.85;
        window.speechSynthesis.speak(msg);
    }

    // [알아요] 버튼: 이 단어를 knownWords에 추가하고 목록에서 제외
    function markAsKnown() {
        const word = vocabulary[currentIndex].en;
        if (!knownWords.includes(word)) {
            knownWords.push(word);
            localStorage.setItem('voca_known', JSON.stringify(knownWords));
        }
        nextWord();
    }

    // [즐겨찾기] 버튼: 별도 체크용
    function toggleFavorite() {
        const word = vocabulary[currentIndex].en;
        if (favorites.includes(word)) {
            favorites = favorites.filter(f => f !== word);
        } else {
            favorites.push(word);
        }
        localStorage.setItem('voca_favs', JSON.stringify(favorites));
        document.getElementById('fav-btn').classList.toggle('active');
    }

    function resetData() {
        if(confirm("모든 즐겨찾기와 학습 기록을 초기화할까요?")) {
            localStorage.clear();
            location.reload();
        }
    }

    // 음성 엔진 로딩 대기
    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }

    // 첫 실행
    nextWord();
</script>

</body>
</html>
