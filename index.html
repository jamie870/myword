<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini Voca: Etymology</title>
    <style>
        :root { --primary: #6366f1; --bg: #f1f5f9; --accent: #f59e0b; --etym: #10b981; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .container { width: 95%; max-width: 420px; background: white; padding: 30px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); text-align: center; position: relative; margin: 20px; }
        .stats { font-size: 0.85rem; color: #94a3b8; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        /* 어원 박스 */
        #etym-box { width: 100%; min-height: 120px; background: #f0fdf4; border-radius: 20px; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; border: 1px solid #dcfce7; padding: 20px; box-sizing: border-box; transition: 0.3s; }
        #etym-text { color: #065f46; font-size: 0.95rem; line-height: 1.6; display: none; text-align: left; }
        .etym-placeholder { color: #86efac; font-weight: 600; font-size: 0.9rem; }

        #word { font-size: 2.6rem; font-weight: 800; color: #1e293b; margin: 15px 0; letter-spacing: -1px; word-break: break-all; }
        #content-area { display: none; margin-top: 20px; animation: fadeIn 0.3s ease; }
        #mean { font-size: 1.4rem; color: var(--primary); font-weight: 700; margin-bottom: 12px; }
        .ex-box { background: #f9fafb; padding: 18px; border-radius: 15px; text-align: left; font-size: 0.95rem; line-height: 1.6; color: #475569; border: 1px solid #f1f5f9; }

        /* 버튼 그룹 */
        .control-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        button { border: none; border-radius: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; outline: none; -webkit-tap-highlight-color: transparent; }
        .btn-etym { background: var(--etym); color: white; padding: 14px; font-size: 0.9rem; }
        .btn-view { background: #f1f5f9; color: #475569; padding: 14px; font-size: 0.9rem; }
        .btn-audio { background: #eef2ff; color: #4f46e5; padding: 14px; font-size: 0.9rem; }
        .btn-next { background: #1e293b; color: white; padding: 18px; grid-column: span 2; font-size: 1.1rem; }
        
        .btn-know { background: transparent; color: #94a3b8; padding: 6px 14px; font-size: 0.75rem; margin-top: 25px; border: 1px solid #e2e8f0; border-radius: 20px; }
        .add-word-btn { background: var(--accent); color: white; padding: 14px; border-radius: 50px; font-size: 0.9rem; margin-top: 15px; width: 100%; }

        /* 모달 */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 25px; width: 85%; max-width: 350px; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-family: inherit; }
        .modal-btns { display: flex; gap: 10px; margin-top: 15px; }
        .modal-btns button { flex: 1; padding: 12px; }

        .fav-star { position: absolute; top: 28px; right: 28px; font-size: 1.6rem; color: #e2e8f0; cursor: pointer; }
        .fav-star.active { color: var(--accent); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="fav-star" id="fav-btn" onclick="toggleFavorite()">★</div>
    <div class="stats">
        <span id="progress-text">남은 단어: 0</span>
        <span onclick="resetData()" style="font-size: 0.7rem; color: #cbd5e1; cursor: pointer;">초기화</span>
    </div>

    <div id="etym-box">
        <div class="etym-placeholder" id="etym-placeholder">유래가 궁금하다면?<br>[어원 보기] 클릭</div>
        <div id="etym-text">어원 정보가 표시됩니다.</div>
    </div>

    <div id="word">Word</div>

    <div class="control-btns">
        <button class="btn-etym" onclick="showEtymology()">📜 어원 보기</button>
        <button class="btn-view" onclick="showContent()">📖 뜻·예문 보기</button>
        <button class="btn-audio" onclick="speak()">🔊 원어민 발음</button>
        <button class="btn-next" onclick="nextWord()">다음 단어 (Next)</button>
    </div>

    <div id="content-area">
        <div id="mean">의미</div>
        <div id="ex-box" class="ex-box"></div>
    </div>

    <button class="btn-know" onclick="markAsKnown()">✅ 이 단어는 마스터했어요</button>
    <button class="add-word-btn" onclick="openModal()">+ 단어 추가하기 (어원 포함)</button>
</div>

<div id="modal">
    <div class="modal-content">
        <h3 style="margin:0 0 15px 0">새 단어 추가</h3>
        <input type="text" id="new-en" placeholder="영어 단어/숙어">
        <input type="text" id="new-ko" placeholder="한글 뜻">
        <textarea id="new-etym" placeholder="어원/유래 설명" rows="2"></textarea>
        <textarea id="new-ex" placeholder="예문" rows="2"></textarea>
        <div class="modal-btns">
            <button onclick="closeModal()" style="background:#f1f5f9;">취소</button>
            <button onclick="addNewWord()" style="background:var(--primary); color:white;">저장</button>
        </div>
    </div>
</div>

<script>
    // 기본 데이터 (어원 추가)
    const defaultVocabulary = [
        { en: "Cut corners", ko: "절차를 생략하다, 편법을 쓰다", etym: "모서리(corners)를 돌아가지 않고 질러가서(cut) 시간을 아끼려는 행동에서 유래했습니다.", ex: "Don't cut corners on safety." },
        { en: "In the black", ko: "흑자인", etym: "과거 회계 장부에 이익은 검은색(black), 손실은 빨간색(red) 잉크로 기록하던 관습에서 유래했습니다.", ex: "The company is finally in the black." },
        { en: "Cold feet", ko: "겁이 남, 주춤함", etym: "전쟁터에서 군인들이 발이 얼어붙어 앞으로 나가지 못하는 상황이나, 도박꾼들이 판을 떠나기 전 발이 차가워진다고 느꼈던 것에서 유래했다는 설이 있습니다.", ex: "He got cold feet before the wedding." },
        { en: "Hit the books", ko: "열공하다", etym: "물리적으로 책을 치는 것이 아니라, 공부를 시작하기 위해 책을 힘차게 펴는 적극적인 행동을 묘사합니다.", ex: "I need to hit the books tonight." }
    ];

    let myVocabulary = JSON.parse(localStorage.getItem('my_voca_etym')) || [];
    let combinedVocabulary = [...defaultVocabulary, ...myVocabulary];
    
    let currentIndex = 0;
    let favorites = JSON.parse(localStorage.getItem('v_favs')) || [];
    let knownWords = JSON.parse(localStorage.getItem('v_known')) || [];

    function updateStats() {
        const pool = combinedVocabulary.filter(w => !knownWords.includes(w.en));
        document.getElementById('progress-text').innerText = `남은 단어: ${pool.length}개`;
    }

    function nextWord() {
        const pool = combinedVocabulary.filter(w => !knownWords.includes(w.en));
        if (pool.length === 0) { alert("학습 완료! 단어를 추가하거나 초기화하세요."); return; }
        
        const nextItem = pool[Math.floor(Math.random() * pool.length)];
        currentIndex = combinedVocabulary.findIndex(w => w.en === nextItem.en);
        
        document.getElementById('word').innerText = nextItem.en;
        document.getElementById('content-area').style.display = 'none';
        document.getElementById('etym-text').style.display = 'none';
        document.getElementById('etym-placeholder').style.display = 'block';
        document.getElementById('fav-btn').classList.toggle('active', favorites.includes(nextItem.en));
        updateStats();
    }

    function showEtymology() {
        const item = combinedVocabulary[currentIndex];
        const textArea = document.getElementById('etym-text');
        const placeholder = document.getElementById('etym-placeholder');
        
        textArea.innerText = item.etym || "이 단어의 어원 정보가 아직 등록되지 않았습니다.";
        textArea.style.display = 'block';
        placeholder.style.display = 'none';
    }

    function showContent() {
        const item = combinedVocabulary[currentIndex];
        document.getElementById('mean').innerText = item.ko;
        document.getElementById('ex-box').innerHTML = `<strong>뜻:</strong> ${item.ko}<br><br><strong>Ex:</strong> ${item.ex || '예문 없음'}`;
        document.getElementById('content-area').style.display = 'block';
    }

    function speak() {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(combinedVocabulary[currentIndex].en);
        const voices = window.speechSynthesis.getVoices();
        const nativeVoice = voices.find(v => v.name.includes('Google US English')) || voices.find(v => v.lang === 'en-US');
        if (nativeVoice) msg.voice = nativeVoice;
        msg.rate = 0.85;
        window.speechSynthesis.speak(msg);
    }

    function markAsKnown() {
        knownWords.push(combinedVocabulary[currentIndex].en);
        localStorage.setItem('v_known', JSON.stringify(knownWords));
        nextWord();
    }

    function toggleFavorite() {
        const word = combinedVocabulary[currentIndex].en;
        if (favorites.includes(word)) favorites = favorites.filter(f => f !== word);
        else favorites.push(word);
        localStorage.setItem('v_favs', JSON.stringify(favorites));
        document.getElementById('fav-btn').classList.toggle('active');
    }

    function openModal() { document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    
    function addNewWord() {
        const en = document.getElementById('new-en').value.trim();
        const ko = document.getElementById('new-ko').value.trim();
        const etym = document.getElementById('new-etym').value.trim();
        const ex = document.getElementById('new-ex').value.trim();

        if (!en || !ko) return;

        myVocabulary.push({ en, ko, etym, ex });
        localStorage.setItem('my_voca_etym', JSON.stringify(myVocabulary));
        combinedVocabulary = [...defaultVocabulary, ...myVocabulary];
        
        document.getElementById('new-en').value = '';
        document.getElementById('new-ko').value = '';
        document.getElementById('new-etym').value = '';
        document.getElementById('new-ex').value = '';
        
        closeModal();
        updateStats();
    }

    function resetData() {
        if(confirm("모든 데이터를 초기화할까요?")) {
            localStorage.clear();
            location.reload();
        }
    }

    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    nextWord();
</script>

</body>
</html>
