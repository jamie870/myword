<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Voca App</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; width: 90%; max-width: 400px; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        
        /* 이미지 컨테이너 추가 */
        #img-box { 
            width: 100%; height: 200px; background: #e2e8f0; border-radius: 15px; 
            margin-bottom: 20px; overflow: hidden; display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        #word-img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.3s; opacity: 0; }
        .loader { position: absolute; font-size: 0.8rem; color: #94a3b8; }

        #word { font-size: 1.8rem; font-weight: 800; color: #1e293b; margin: 10px 0; }
        #mean { font-size: 1.2rem; color: var(--primary); margin: 10px 0; display: none; }
        .ex-box { background: #f1f5f9; padding: 15px; border-radius: 12px; text-align: left; margin-top: 15px; display: none; font-size: 0.9rem; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-show { background: var(--primary); color: white; }
        .btn-next { background: #1e293b; color: white; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="card">
    <div id="img-box">
        <span class="loader">이미지 불러오는 중...</span>
        <img id="word-img" src="" alt="word visualization">
    </div>
    <div id="word">Loading...</div>
    <div id="mean"></div>
    <div id="ex-box" class="ex-box"></div>
    
    <div class="btn-group">
        <button class="btn-show" onclick="toggleMean()">뜻 보기</button>
        <button class="btn-next" onclick="nextWord()">다음 단어</button>
    </div>
</div>

<script>
    // 이 부분에 앞서 전달드린 300개의 단어 데이터를 붙여넣으세요!
    const vocabulary = [
        
{ en: "Be grappling with", ko: "~에 어려움을 겪고 있다", ex: ["The city is grappling with high costs.", "I'm grappling with a hard choice.", "She's grappling with the loss."], exKo: ["도시는 높은 물가와 싸우고 있다.", "나는 어려운 선택으로 고심 중이다.", "그녀는 상실감에 힘들어하고 있다."] },
            { en: "Cost of food away from home", ko: "외식 비용", ex: ["Away-from-home food costs rose.", "We need to cut외식비.", "Sticker shock on food away from home."], exKo: ["외식 비용이 상승했습니다.", "외식비를 줄여야 합니다.", "외식비 가격에 충격을 받았습니다."] },

            { en: "On a whim", ko: "충동적으로", ex: ["Bought it on a whim.", "Traveled on a whim.", "Don't act on a whim."], exKo: ["충동적으로 그것을 샀다.", "즉흥적으로 여행했다.", "충동적으로 행동하지 마라."] },
            { en: "Livid", ko: "몹시 화난", ex: ["He was livid at me.", "Boss was livid today.", "I'm absolutely livid."], exKo: ["그는 나에게 격분했다.", "사장님이 오늘 몹시 화나셨다.", "나 진짜 머리끝까지 화났어."] },

        imgElement.onload = () => {
            imgElement.style.opacity = 1;
            loader.style.display = 'none';
        };

        // 초기화
        document.getElementById('mean').style.display = 'none';
        document.getElementById('ex-box').style.display = 'none';
    }

    function toggleMean() {
        const mean = document.getElementById('mean');
        const ex = document.getElementById('ex-box');
        const isHidden = mean.style.display === 'none';
        
        mean.style.display = isHidden ? 'block' : 'none';
        ex.style.display = isHidden ? 'block' : 'none';
    }

    // 첫 실행
    nextWord();
</script>

</body>
